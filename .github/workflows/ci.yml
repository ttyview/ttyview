name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --workspace
      - run: cargo test --workspace
      - name: Upload daemon binary for e2e job
        uses: actions/upload-artifact@v4
        with:
          name: ttyview
          path: target/release/ttyview
          retention-days: 1

  client-unit:
    name: Client unit tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - working-directory: tests/client
        run: npm ci || npm install
      - working-directory: tests/client
        run: npm test

  e2e:
    name: E2E (Playwright + tmux)
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Download daemon binary
        uses: actions/download-artifact@v4
        with:
          name: ttyview
          path: target/release
      - run: chmod +x target/release/ttyview
      - working-directory: tests/e2e
        run: npm ci || npm install
      - working-directory: tests/e2e
        run: npx playwright install chromium --with-deps
      - working-directory: tests/e2e
        run: npm test
      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: tests/e2e/test-results/
          retention-days: 7
