<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>ttyview</title>
<style>
  /* Theme variables — plugins set these via window.ttyview.contributes.theme().
     Defaults match the original "VS Code Dark"-ish palette this project shipped
     with. A theme plugin overrides the ones it cares about; missing vars fall
     back to these. */
  :root {
    color-scheme: dark;
    --ttv-bg: #1e1e1e;
    --ttv-fg: #d4d4d4;
    --ttv-bg-elev: #0d0d0d;
    --ttv-bg-elev2: #1a1a1a;
    --ttv-border: #2a2a2a;
    --ttv-accent: #6ed29a;
    --ttv-muted: #888;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--ttv-bg); color: var(--ttv-fg); font-family: system-ui, sans-serif; }
  body { display: flex; flex-direction: column; }

  header {
    flex: none;
    padding: 6px 8px;
    background: var(--ttv-bg-elev);
    border-bottom: 1px solid #333;
    display: flex; align-items: center; gap: 4px;
    font-size: 13px;
  }
  header .title { font-weight: 600; color: var(--ttv-accent); }
  header .sep { color: #666; }
  header select, header button {
    background: #2d2d2d;
    color: var(--ttv-fg);
    border: 1px solid #444;
    border-radius: 4px;
    padding: 4px 8px;
    font: inherit;
    cursor: pointer;
  }
  header select:hover, header button:hover { background: #3d3d3d; }
  /* Compact "kebab" overflow menu collapses minor controls on narrow
     viewports so the picker button gets enough horizontal room. */
  header #more-menu {
    position: relative;
  }
  header #more-menu-btn { padding: 4px 8px; }
  header #more-menu-panel {
    position: absolute; top: 100%; right: 0;
    margin-top: 4px;
    background: var(--ttv-bg-elev2);
    border: 1px solid #444;
    border-radius: 6px;
    padding: 6px;
    display: none;
    flex-direction: column;
    gap: 4px;
    z-index: 50;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
  }
  header #more-menu-panel.open { display: flex; }
  header #more-menu-panel button {
    width: 100%;
    text-align: left;
    padding: 6px 10px;
  }
  header #more-menu-panel .row {
    display: flex; gap: 4px;
    border-bottom: 1px solid var(--ttv-border);
    padding-bottom: 6px; margin-bottom: 2px;
  }
  header #more-menu-panel .row:last-child {
    border-bottom: none; padding-bottom: 0; margin-bottom: 0;
  }
  header #more-menu-panel .row button { flex: 1; text-align: center; min-width: 32px; }

  /* Custom in-app pane picker (replaces native <select>) */
  #pane-picker-btn {
    flex: 1; min-width: 0;
    text-align: left;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 10px;
    background: #2d2d2d;
    color: var(--ttv-fg);
    border: 1px solid #444;
    border-radius: 4px;
    font: inherit;
    cursor: pointer;
    overflow: hidden;
  }
  #pane-picker-btn:hover { background: #3d3d3d; }
  #pane-picker-btn .label {
    flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #pane-picker-btn .chev { color: var(--ttv-muted); font-size: 0.8em; }

  /* Settings overlay — full-page modal listing plugins, theme, etc. */
  #settings-overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.85);
    z-index: 110;
    display: flex;
    align-items: center; justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 120ms ease-out;
  }
  #settings-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }
  #settings-panel {
    width: min(640px, 100vw);
    height: min(720px, 100vh);
    background: var(--ttv-bg-elev2);
    border: 1px solid var(--ttv-border);
    border-radius: 8px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  /* Mobile: pin the panel to the top of the visible viewport so the
     header (with × close) is always reachable. `align-items: center`
     on the overlay caused the panel to be vertically centered against
     a 100vh container, but Android Chrome's 100vh is the URL-bar-
     COLLAPSED height — so when the URL bar is showing, the centered
     panel overflowed above the visible area and the close button was
     unreachable. Switching to flex-start + dvh fixes it. */
  @media (max-width: 600px) {
    #settings-overlay { align-items: flex-start; }
    #settings-panel {
      width: 100vw;
      height: 100vh;       /* fallback */
      height: 100dvh;       /* dynamic viewport — adjusts to URL bar */
      border-radius: 0;
    }
  }
  #settings-header {
    flex: none;
    display: flex; align-items: center; gap: 8px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--ttv-border);
    background: var(--ttv-bg-elev);
  }
  #settings-header .title { flex: 1; font-weight: 600; color: var(--ttv-fg); font-size: 16px; }
  #settings-close {
    background: transparent;
    color: var(--ttv-fg);
    border: none;
    font-size: 22px;
    cursor: pointer;
    padding: 0 8px;
    line-height: 1;
  }
  #settings-close:hover { color: #f48771; }
  #settings-tabs {
    flex: none;
    display: flex; gap: 2px;
    padding: 8px 8px 0;
    border-bottom: 1px solid var(--ttv-border);
    background: var(--ttv-bg-elev);
    overflow-x: auto;
  }
  #settings-tabs .tab {
    padding: 8px 14px;
    background: transparent;
    color: var(--ttv-muted);
    border: none;
    border-bottom: 2px solid transparent;
    font: inherit;
    cursor: pointer;
    white-space: nowrap;
  }
  #settings-tabs .tab:hover { color: var(--ttv-fg); }
  #settings-tabs .tab.active {
    color: var(--ttv-accent);
    border-bottom-color: var(--ttv-accent);
  }
  #settings-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    color: var(--ttv-fg);
  }
  #settings-body h3 { margin-top: 0; color: var(--ttv-fg); font-weight: 500; }
  #settings-body .plugin-card {
    background: #252526;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 12px 14px;
    margin-bottom: 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  #settings-body .plugin-card .name { font-weight: 600; color: var(--ttv-fg); }
  #settings-body .plugin-card .meta { color: var(--ttv-muted); font-size: 12px; }
  #settings-body .plugin-card .desc { color: #b8b8b8; font-size: 13px; line-height: 1.4; margin-top: 4px; }
  #settings-body .plugin-card .row { display: flex; align-items: center; gap: 8px; }
  #settings-body .plugin-card .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    background: #2d2d2d;
    color: var(--ttv-muted);
  }
  #settings-body .plugin-card .badge.builtin { background: #1f3a2a; color: var(--ttv-accent); }
  #settings-body .plugin-card .badge.active   { background: #1f2a3a; color: #6e9ed2; }
  #settings-body .empty { color: var(--ttv-muted); padding: 16px 0; }
  #settings-body table { width: 100%; border-collapse: collapse; font-size: 13px; }
  #settings-body table th, #settings-body table td { padding: 6px 8px; border-bottom: 1px solid var(--ttv-border); text-align: left; }
  #settings-body table th { color: var(--ttv-muted); font-weight: 500; }

  #pane-picker-overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.55);
    z-index: 100;
    display: flex;                /* always laid out — no display:none toggle */
    flex-direction: column;
    justify-content: flex-end;
    /* Hide via translate (off-screen), not opacity, so the overlay
       stays at 100% paint cost only when shown. translate3d is
       cheap (compositor-only) and reliably promotes to its own
       layer on mobile Chrome. opacity transitions caused multi-
       second paint stalls on the user's phone — see diag log
       2026-05-08 18:08 (paint_ms=6015→1746 with prior opacity-
       only approach). */
    transform: translateY(100%);
    pointer-events: none;
    transition: transform 150ms ease-out;
    /* Force a layer */
    will-change: transform;
    isolation: isolate;
  }
  #pane-picker-overlay.open {
    transform: translateY(0);
    pointer-events: auto;
  }
  #pane-picker-panel {
    background: var(--ttv-bg-elev2);
    border-top: 1px solid #444;
    border-radius: 12px 12px 0 0;
    max-height: 80vh;
    /* Account for iOS/Android home indicator + insets when present */
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom)) 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.5);
  }
  #pane-picker-panel .pp-header {
    padding: 8px 16px 12px;
    color: var(--ttv-muted); font-size: 12px;
    border-bottom: 1px solid var(--ttv-border);
  }
  #pane-picker-panel .pp-item {
    display: flex; align-items: center;
    padding: 14px 16px;
    cursor: pointer;
    color: var(--ttv-fg);
    border-bottom: 1px solid #222;
    font-size: 14px;
  }
  #pane-picker-panel .pp-item:hover, #pane-picker-panel .pp-item.active {
    background: #2a2a2a;
  }
  #pane-picker-panel .pp-item.active { color: var(--ttv-accent); }
  #pane-picker-panel .pp-item .pp-session {
    flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-weight: 500;
  }
  #pane-picker-panel .pp-item .pp-meta {
    color: var(--ttv-muted); font-size: 12px; margin-left: 8px;
  }

  /* Loading skeleton inside the grid host while a switch is in flight */
  #grid-host.loading::after {
    content: 'Loading pane…';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: var(--ttv-muted);
    font-family: system-ui, sans-serif;
    font-size: 14px;
    pointer-events: none;
  }
  #grid-host { position: relative; }
  header .font-ctl { display: flex; gap: 2px; }
  header .font-ctl button { padding: 4px 6px; min-width: 26px; }
  header .status {
    margin-left: 4px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--ttv-muted);
    display: inline-block;
    flex: none;
    transition: background-color 200ms;
    overflow: hidden;
    text-indent: -9999px;       /* hide the literal text content */
  }
  header .status.connected { background: var(--ttv-accent); }
  header .status.error { background: #f48771; }
  /* Hide brand title on narrow viewports — picker button gets the space. */
  @media (max-width: 600px) {
    header .title, header .sep { display: none; }
    header { padding: 6px 6px; }
  }

  #grid-host {
    flex: 1;
    overflow: auto;
    contain: layout style;
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', Menlo, Consolas, monospace;
    font-size: var(--ttv-font-size, 12px);
    line-height: 1.25;
    padding: 4px 6px;
    -webkit-font-smoothing: antialiased;
    touch-action: pan-y;
  }

  /* Slot rows — three of them (above-grid, below-grid, above-input)
     share the same horizontal-scroll layout. The layout customizer
     (Settings → Layout) lets the user move widgets between these
     and the header-right slot. Each is hidden until at least one
     plugin contributes; the mounter toggles [hidden]. */
  [data-slot="above-grid"],
  [data-slot="below-grid"],
  [data-slot="above-input"] {
    flex: none;
    display: flex;
    gap: 4px;
    padding: 4px 8px;
    background: var(--ttv-bg-elev);
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  [data-slot="above-grid"]   { border-bottom: 1px solid var(--ttv-border); }
  [data-slot="below-grid"]   { border-top: 1px solid var(--ttv-border); border-bottom: 1px solid var(--ttv-border); }
  [data-slot="above-input"]  { border-top: 1px solid #333; }
  [data-slot][hidden] { display: none; }
  [data-slot]::-webkit-scrollbar { display: none; }
  [data-slot] .tb-slot,
  [data-slot] .ia-slot { display: inline-flex; gap: 4px; }
  /* Buttons in the row slots share styling regardless of which kind
     of widget mounted them. Header buttons keep their own header-only
     styling (smaller, no row chrome). */
  [data-slot="above-grid"] button,
  [data-slot="below-grid"] button,
  [data-slot="above-input"] button {
    flex: none;
    background: var(--ttv-bg-elev2);
    color: var(--ttv-fg);
    border: 1px solid var(--ttv-border);
    border-radius: 4px;
    font: inherit;
    font-size: 12px;
    padding: 5px 10px;
    cursor: pointer;
    white-space: nowrap;
  }
  [data-slot="above-grid"] button:active,
  [data-slot="below-grid"] button:active,
  [data-slot="above-input"] button:active { background: var(--ttv-border); }

  /* Input row at bottom — send keys back to tmux. */
  #input-row {
    flex: none;
    display: flex;
    gap: 6px;
    padding: 6px 8px;
    background: var(--ttv-bg-elev);
    border-top: 1px solid #333;
  }
  #input-row textarea {
    flex: 1;
    resize: none;
    min-height: 36px;
    max-height: 120px;
    padding: 6px 10px;
    background: #252526;
    color: var(--ttv-fg);
    border: 1px solid #444;
    border-radius: 6px;
    font-family: system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.4;
    outline: none;
  }
  #input-row textarea:focus { border-color: #4ec9b0; }
  #input-row textarea::placeholder { color: #666; }
  #send-btn {
    flex: none;
    padding: 0 14px;
    background: #4ec9b0;
    color: var(--ttv-bg-elev);
    border: none;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
  }
  #send-btn:hover { background: #5fdac1; }
  #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .ttv-row {
    display: block;
    white-space: pre;
    min-height: 1.25em;
    contain: layout style paint;
  }
  /* Frozen scrollback rows — once written, never mutated. Off-screen
     rows skip layout/paint via content-visibility (browsers that don't
     support it just render normally). */
  .ttv-row.frozen {
    content-visibility: auto;
    contain-intrinsic-size: auto 1.25em;
  }
  .ttv-cell {
    display: inline-block;
    width: 1ch;
  }
  .ttv-cell-w0 { width: 0; }
  .ttv-cell-w2 { width: 2ch; }
  #sb-host { display: block; }
  #primary-host { display: block; }

  #empty-msg {
    padding: 24px;
    color: var(--ttv-muted);
    line-height: 1.5;
  }
  #empty-msg code {
    background: #2d2d2d;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: monospace;
    font-size: 0.9em;
  }
  #empty-msg a { color: var(--ttv-accent); }
  /* Command palette — Ctrl/Cmd-K opens a centered floating list of
     registered commands. Mobile-friendly: caps width, uses dvh, pins
     to the top of the visible viewport (same fix as the Settings
     overlay). */
  #cmd-palette-overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.55);
    z-index: 120;
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 14vh;
    opacity: 0; pointer-events: none;
    transition: opacity 100ms ease-out;
  }
  #cmd-palette-overlay.open { opacity: 1; pointer-events: auto; }
  #cmd-palette {
    width: min(560px, 92vw);
    max-height: min(60vh, 60dvh);
    background: var(--ttv-bg-elev2);
    border: 1px solid var(--ttv-border);
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #cmd-palette input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--ttv-border);
    color: var(--ttv-fg);
    font: inherit; font-size: 16px;
    padding: 12px 14px;
    outline: none;
  }
  #cmd-palette input::placeholder { color: var(--ttv-muted); }
  #cmd-palette-list {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .cmdp-item {
    padding: 10px 14px;
    cursor: pointer;
    color: var(--ttv-fg);
    border-bottom: 1px solid var(--ttv-border);
    font-size: 14px;
    display: flex; flex-direction: column; gap: 3px;
  }
  .cmdp-item.active { background: var(--ttv-bg-elev); color: var(--ttv-accent); }
  .cmdp-item .cmdp-name { font-weight: 500; }
  .cmdp-item .cmdp-id   { color: var(--ttv-muted); font-size: 11px; }
  .cmdp-empty { padding: 14px; color: var(--ttv-muted); }
</style>
</head>
<body>
<header>
  <span class="title">ttyview</span>
  <span class="sep">·</span>
  <button id="pane-picker-btn" type="button" aria-haspopup="listbox" aria-expanded="false">
    <span class="label" id="pane-picker-label">—</span>
    <span class="chev">▾</span>
  </button>
  <!-- Hidden native select kept for tests + a11y; mirrors the picker. -->
  <select id="pane-select" style="display:none" aria-hidden="true"></select>
  <button id="refresh" title="Refresh pane list">↻</button>
  <span class="font-ctl">
    <button id="font-down" title="Smaller font">A−</button>
    <button id="font-fit" title="Auto-fit pane to viewport">↔</button>
    <button id="font-up" title="Larger font">A+</button>
  </span>
  <button id="scroll-bottom" title="Scroll to live tail">↓</button>
  <button id="settings-btn" title="Settings">⚙</button>
  <span id="header-widgets" data-slot="header-right"><!-- plugin-rendered widgets land here --></span>
  <span class="status" id="status">disconnected</span>
</header>

<div id="pane-picker-overlay" role="dialog" aria-label="Choose a pane">
  <div id="pane-picker-panel" role="listbox">
    <div class="pp-header">Choose a pane</div>
    <div id="pane-picker-list"></div>
  </div>
</div>

<!-- tabBar plugins mount a horizontal-scroll row of buttons here.
     Hidden by default; appears once any plugin contributes (the
     [hidden] attribute is toggled by the mounter). -->
<div id="tab-bar" data-slot="above-grid" hidden></div>

<!-- Mount point for the active terminal-view plugin. Cell-grid (the
     default plugin) creates its own #sb-host + #primary-host children
     inside this. Other plugins can replace the rendering entirely. -->
<div id="grid-host"></div>

<div id="cmd-palette-overlay" role="dialog" aria-label="Command palette">
  <div id="cmd-palette">
    <input id="cmd-palette-input" type="text" placeholder="Type a command…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
    <div id="cmd-palette-list" role="listbox"></div>
  </div>
</div>

<div id="settings-overlay" role="dialog" aria-label="Settings">
  <div id="settings-panel">
    <div id="settings-header">
      <span class="title">Settings</span>
      <button id="settings-close" type="button" aria-label="Close">×</button>
    </div>
    <div id="settings-tabs"></div>
    <div id="settings-body"></div>
  </div>
</div>

<!-- A user-controllable slot between the grid and the input. Hidden
     by default; the layout customizer can move widgets into it from
     other slots. Same horizontal-scroll style as the other rows. -->
<div id="below-grid" data-slot="below-grid" hidden></div>

<!-- inputAccessory plugins mount horizontal-scroll button rows here.
     Empty by default; appears once any plugin contributes. -->
<div id="input-accessory" data-slot="above-input" hidden></div>

<div id="input-row">
  <textarea id="input-text" placeholder="Message" rows="1"></textarea>
  <button id="send-btn" type="button">Send</button>
</div>

<script>
// Core globals — only what the platform itself owns. Cell-grid
// plugin owns its sb-host / primary-host / cells state; lives in
// the plugin closure (defined later). #grid-host is a generic
// mount point passed to the active terminal-view plugin's render().
const $host = document.getElementById('grid-host');
const $select = document.getElementById('pane-select');
const $refresh = document.getElementById('refresh');
const $status = document.getElementById('status');

let activePaneId = null;
let ws = null;
let wsRetryMs = 1000;

// =============================================================
// Plugin API surface
// =============================================================
//
// `window.ttyview` is the contract for plugins. It is small,
// versioned, and append-only — adding new contribution points
// or events is fine; removing/changing existing ones bumps
// apiVersion and breaks plugins that target the old version.
//
// Phase 1 (today): in-page-only plugins. Cell-grid is the
// reference plugin, registered by this same bundle. Settings
// overlay reads the registries to show "what's installed."
// Phase 2: settings-driven enable/disable. Phase 3: remote
// install from a community registry.
//
// Plugins access the API via window.ttyview. They declare
// what they contribute; the core knows the FULL set of
// contribution points and renders them generically. Plugins
// don't poke at the DOM directly — they declare contributions
// and the core handles placement/lifecycle.
window.ttyview = (function() {
  const eventListeners = new Map(); // event-name -> Set<handler>
  const registries = {
    terminalView: new Map(),  // id -> def {id, name, description?, render(host, ctx)}
    settingsTab: new Map(),   // id -> def {id, title, render(container)}
    command: new Map(),       // id -> def {id, name, hotkey?, handler()}
    theme: new Map(),         // id -> def {id, name, vars: {key:val}}
    headerWidget: new Map(),  // id -> def {id, name, render(slot)}
    inputAccessory: new Map(), // id -> def {id, name, render(slot)} — row above the chat input
    tabBar: new Map(),         // id -> def {id, name, render(slot)} — horizontal-scroll row above the grid
    panePickerList: new Map(), // id -> def {id, name, render(slot, ctx)} — owns the picker list contents
  };
  let activeTerminalViewId = null;
  let activeTerminalViewUnmount = null;  // returned by the plugin's render()
  let activeThemeId = null;
  // Names of CSS vars a theme is allowed to override. Anything outside this
  // list is silently ignored — keeps a misbehaving theme from clobbering
  // unrelated CSS or injecting arbitrary properties.
  const THEME_VARS = new Set([
    '--ttv-bg', '--ttv-fg', '--ttv-bg-elev', '--ttv-bg-elev2',
    '--ttv-border', '--ttv-accent', '--ttv-muted',
  ]);
  function applyThemeVars(vars) {
    const root = document.documentElement.style;
    // Wipe previously-applied vars so switching themes doesn't carry
    // stale overrides — :root defaults from the stylesheet take over
    // whenever a theme doesn't set a particular var.
    for (const v of THEME_VARS) root.removeProperty(v);
    if (!vars) return;
    for (const [k, val] of Object.entries(vars)) {
      if (THEME_VARS.has(k) && typeof val === 'string') {
        root.setProperty(k, val);
      }
    }
  }

  function emit(event, data) {
    const set = eventListeners.get(event);
    if (!set) return;
    for (const h of [...set]) {
      try { h(data); } catch (e) { console.error('plugin event handler:', e); }
    }
  }
  function on(event, handler) {
    if (!eventListeners.has(event)) eventListeners.set(event, new Set());
    eventListeners.get(event).add(handler);
    return () => eventListeners.get(event)?.delete(handler);
  }
  function makeContributor(kind) {
    return function(def) {
      if (!def || !def.id) throw new Error('plugin contribution requires { id }');
      registries[kind].set(def.id, def);
      emit(kind + '-registered', def);
      return function unregister() {
        registries[kind].delete(def.id);
        emit(kind + '-unregistered', def);
      };
    };
  }
  function pluginStorage(pluginId) {
    const prefix = 'ttv-plugin:' + pluginId + ':';
    return {
      get(key) {
        try {
          const raw = localStorage.getItem(prefix + key);
          return raw == null ? null : JSON.parse(raw);
        } catch { return null; }
      },
      set(key, value) {
        try { localStorage.setItem(prefix + key, JSON.stringify(value)); } catch {}
      },
      remove(key) {
        try { localStorage.removeItem(prefix + key); } catch {}
      },
    };
  }
  return {
    apiVersion: 1,
    // === Pane state + actions ===
    listPanes: function() { return panesCache.slice(); },
    getActivePane: function() {
      return panesCache.find(function(p) { return p.id === activePaneId; }) || null;
    },
    selectPane: function(paneId) { return selectPane(paneId); },
    // Programmatic open / close of the pane picker overlay. Used by the
    // ttyview-pane-picker plugin's "switch to recent" affordances and
    // by tests / commands.
    openPanePicker:  function() { try { openPanePicker(); }  catch {} },
    closePanePicker: function() { try { closePanePicker(); } catch {} },
    sendInput: function(paneId, keys) {
      // Forward via WS; daemon routes via t:'input'. Returns boolean
      // so plugins (Quick Keys, etc.) can give visual feedback when
      // the send didn't go through (typically WS reconnecting after
      // an Android Chrome tab-backgrounding cycle). Diag-logged in
      // both branches — see the inp / inp-skip / inp-throw cats.
      const target = paneId || activePaneId;
      const wsState = ws ? ws.readyState : -1;
      const reason = !ws ? 'no-ws'
        : ws.readyState !== WebSocket.OPEN ? 'ws-not-open'
        : !target ? 'no-pane'
        : null;
      if (reason) {
        if (typeof ttvDiag === 'function') {
          ttvDiag('inp-skip', { reason: reason, ws_state: wsState, pane: target, len: keys.length, src: 'plugin-api' });
        }
        return false;
      }
      const converted = keys.replace(/\n/g, '\r');
      try {
        ws.send(JSON.stringify({ t: 'input', p: target, keys: converted }));
        if (typeof ttvDiag === 'function') {
          ttvDiag('inp', { pane: target, len: converted.length, ws_state: wsState, src: 'plugin-api' });
        }
        return true;
      } catch (e) {
        if (typeof ttvDiag === 'function') {
          ttvDiag('inp-throw', { msg: String(e && e.message), pane: target, len: keys.length, src: 'plugin-api' });
        }
        return false;
      }
    },
    // === Events ===
    // Emitted: 'pane-changed', 'panes-updated', 'grid-loaded',
    //          'cell-diff', 'scrollback-append',
    //          '{kind}-registered', '{kind}-unregistered'.
    on: on,
    // === Contribution points ===
    contributes: {
      terminalView: makeContributor('terminalView'),
      settingsTab:  makeContributor('settingsTab'),
      command:      makeContributor('command'),
      theme:        makeContributor('theme'),
      headerWidget: makeContributor('headerWidget'),
      inputAccessory: makeContributor('inputAccessory'),
      tabBar:         makeContributor('tabBar'),
      panePickerList: makeContributor('panePickerList'),
    },
    // === Per-plugin storage (localStorage scoped by plugin id) ===
    storage: pluginStorage,
    // === Internal — used by the settings UI to render registries ===
    _internal: {
      registries: registries,
      emit: emit,
      getActiveThemeId: function() { return activeThemeId; },
      setActiveThemeId: function(id) {
        activeThemeId = id || null;
        try {
          if (id) localStorage.setItem('ttv-active-theme', id);
          else localStorage.removeItem('ttv-active-theme');
        } catch {}
        if (!id) { applyThemeVars(null); emit('theme-activated', { id: null }); return; }
        const def = registries.theme.get(id);
        applyThemeVars(def && def.vars);
        emit('theme-activated', { id });
      },
      getActiveTerminalViewId: function() { return activeTerminalViewId; },
      // Mount the plugin's render(host, ctx). Unmounts the previous
      // active view first if any. Errors during mount are caught
      // and logged so a buggy plugin can't crash the whole platform.
      setActiveTerminalViewId: function(id) {
        if (activeTerminalViewUnmount) {
          try { activeTerminalViewUnmount(); }
          catch (e) { console.error('terminal-view unmount threw', e); }
          activeTerminalViewUnmount = null;
        }
        // Empty the host so the new plugin starts from a clean slate.
        if ($host) $host.innerHTML = '';
        activeTerminalViewId = id;
        try {
          if (id) localStorage.setItem('ttv-active-view', id);
          else localStorage.removeItem('ttv-active-view');
        } catch {}
        if (!id) return;
        const def = registries.terminalView.get(id);
        if (!def || typeof def.render !== 'function') {
          console.warn('terminal-view not registered or missing render():', id);
          return;
        }
        try {
          activeTerminalViewUnmount = def.render($host, {
            api: window.ttyview,
            pluginId: id,
          }) || null;
        } catch (e) {
          console.error('terminal-view render threw', e);
        }
        emit('terminal-view-activated', { id });
        // After activation: if the user previously had a different view
        // selected and the WS is already connected, the new plugin needs
        // a fresh grid-loaded event to populate. Re-emit now via the
        // platform's loadGrid path if a pane is selected.
        if (typeof loadGrid === 'function' && activePaneId) {
          try { loadGrid(activePaneId); } catch {}
        }
      },
    },
  };
})();

// === Theme auto-apply on registration ===
// If the user previously activated a theme, apply it as soon as its
// plugin registers (theme plugins are typically eval'd by the boot
// loader after the platform is up — handle the late-arrival case).
(function() {
  let savedId = null;
  try { savedId = localStorage.getItem('ttv-active-theme'); } catch {}
  if (!savedId) return;
  // If already registered (e.g. bundled), apply immediately.
  if (window.ttyview._internal.registries.theme.has(savedId)) {
    window.ttyview._internal.setActiveThemeId(savedId);
  }
  window.ttyview.on('theme-registered', function(def) {
    if (def && def.id === savedId) {
      window.ttyview._internal.setActiveThemeId(savedId);
    }
  });
})();

// === Unified widget mounter (slot-aware) ===
// Three contribution kinds — headerWidget / inputAccessory / tabBar —
// share the same mount lifecycle. They differ only in their default
// slot. The user can override each plugin's slot via the layout
// customizer in Settings → Layout, persisted in
// localStorage['ttv-layout'] as { <pluginId>: <slotId> }.
//
// Slots are looked up by `[data-slot=<id>]` so adding a new slot is
// HTML-only — no JS change needed beyond updating SLOTS below.
(function() {
  // Public list of moveable slots. Order matters for the layout-tab
  // dropdown (top to bottom of the page).
  const SLOTS = [
    { id: 'header-right', name: 'Header (right)' },
    { id: 'above-grid',   name: 'Above grid' },
    { id: 'below-grid',   name: 'Below grid' },
    { id: 'above-input',  name: 'Above input' },
  ];
  const KIND_DEFAULT_SLOT = {
    headerWidget:   'header-right',
    tabBar:         'above-grid',
    inputAccessory: 'above-input',
  };
  const SLOT_KINDS = ['headerWidget', 'tabBar', 'inputAccessory'];
  const SLOT_INNER_CLASS = {
    'header-right': 'hw-slot',
    'above-grid':   'tb-slot',
    'below-grid':   'tb-slot',
    'above-input':  'ia-slot',
  };

  // ---- layout map (per-plugin slot override) ----
  const LAYOUT_KEY = 'ttv-layout';
  function loadLayout() {
    try { return JSON.parse(localStorage.getItem(LAYOUT_KEY) || '{}'); }
    catch { return {}; }
  }
  function saveLayout(m) {
    try { localStorage.setItem(LAYOUT_KEY, JSON.stringify(m)); } catch {}
  }
  let layout = loadLayout();

  // ---- mounting bookkeeping ----
  // pluginId → { def, kind, slotId, slotEl, unmount }
  const mounted = new Map();

  function slotElFor(slotId) {
    return document.querySelector('[data-slot="' + CSS.escape(slotId) + '"]');
  }
  function refreshVisibility() {
    // Hide slot containers that have no inner mounts. Ignore the
    // header-right slot (always inline in the header chrome).
    for (const s of SLOTS) {
      if (s.id === 'header-right') continue;
      const el = slotElFor(s.id);
      if (!el) continue;
      const hasContent = el.querySelector('[data-plugin-id]');
      el.hidden = !hasContent;
    }
  }
  function resolveSlot(def, kind) {
    return layout[def.id] || KIND_DEFAULT_SLOT[kind] || 'above-grid';
  }
  function mountInto(def, kind, slotId) {
    if (mounted.has(def.id)) return;
    const slotEl = slotElFor(slotId);
    if (!slotEl) {
      console.warn('[layout] no DOM for slot:', slotId, 'plugin:', def.id);
      return;
    }
    const inner = document.createElement('span');
    inner.className = SLOT_INNER_CLASS[slotId] || 'hw-slot';
    inner.dataset.pluginId = def.id;
    if (slotId === 'header-right') {
      inner.style.cssText = 'display:inline-flex;align-items:center;';
    }
    slotEl.appendChild(inner);
    let unmount = null;
    try {
      unmount = (typeof def.render === 'function') ? def.render(inner) || null : null;
    } catch (e) {
      console.error('[' + kind + '] render threw for ' + def.id, e);
    }
    mounted.set(def.id, { def, kind, slotId, slotEl: inner, unmount });
    refreshVisibility();
  }
  function unmountOne(pluginId) {
    const m = mounted.get(pluginId);
    if (!m) return;
    if (typeof m.unmount === 'function') {
      try { m.unmount(); }
      catch (e) { console.error('[' + m.kind + '] unmount threw for ' + pluginId, e); }
    }
    if (m.slotEl && m.slotEl.parentNode) m.slotEl.parentNode.removeChild(m.slotEl);
    mounted.delete(pluginId);
    refreshVisibility();
  }
  function unmountByDef(def) { unmountOne(def.id); }

  // Move a widget to a different slot. Used by the layout customizer.
  function setSlot(pluginId, slotId) {
    if (!SLOTS.find(s => s.id === slotId)) {
      throw new Error('unknown slot: ' + slotId);
    }
    const m = mounted.get(pluginId);
    if (!m) {
      // Plugin not currently mounted — just persist and let the next
      // mount pick it up.
      layout[pluginId] = slotId;
      saveLayout(layout);
      return;
    }
    if (m.slotId === slotId) return;
    const def = m.def;
    const kind = m.kind;
    unmountOne(pluginId);
    layout[pluginId] = slotId;
    saveLayout(layout);
    mountInto(def, kind, slotId);
    window.ttyview._internal.emit('widget-moved', { pluginId, slotId });
  }

  // ---- wire the existing kinds ----
  function attachKind(kind) {
    function onReg(def)   { mountInto(def, kind, resolveSlot(def, kind)); }
    function onUnreg(def) { unmountByDef(def); }
    for (const def of window.ttyview._internal.registries[kind].values()) onReg(def);
    window.ttyview.on(kind + '-registered',   onReg);
    window.ttyview.on(kind + '-unregistered', onUnreg);
  }
  for (const kind of SLOT_KINDS) attachKind(kind);

  // ---- expose for the layout customizer + tests ----
  window.ttyview._internal.layout = {
    SLOTS,
    KIND_DEFAULT_SLOT,
    SLOT_KINDS,
    getMounted: function() {
      // Snapshot for UI rendering — don't expose the live Map's defs etc.
      return Array.from(mounted.entries()).map(function(e) {
        return { pluginId: e[0], kind: e[1].kind, slotId: e[1].slotId, name: e[1].def.name || e[1].def.id };
      });
    },
    setSlot: setSlot,
    resetSlot: function(pluginId) {
      const m = mounted.get(pluginId);
      if (m) setSlot(pluginId, KIND_DEFAULT_SLOT[m.kind]);
      else { delete layout[pluginId]; saveLayout(layout); }
    },
  };
})();

// === Pane-picker-list mounter ===
// First registered panePickerList plugin owns #pane-picker-list. The
// plugin is responsible for self-rendering against panesCache /
// pane-changed events; openPanePicker just shows the overlay.
//
// Symmetric to terminalView's "active id" pattern — registering a
// panePickerList plugin replaces any prior one (rare; usually only
// the bundled ttyview-pane-picker is installed). If the active
// plugin is unmounted (uninstalled / disabled), we fall back to the
// built-in arbitrary-order render the next time the picker opens.
(function() {
  const $list = document.getElementById('pane-picker-list');
  if (!$list) return;
  let active = null;          // { def, unmount }

  function unmountActive() {
    if (active && typeof active.unmount === 'function') {
      try { active.unmount(); }
      catch (e) { console.error('panePickerList unmount threw', e); }
    }
    active = null;
    $list.innerHTML = '';
  }
  function mount(def) {
    unmountActive();          // single-active model
    let unmount = null;
    try {
      unmount = (typeof def.render === 'function')
        ? def.render($list, { api: window.ttyview }) || null
        : null;
    } catch (e) {
      console.error('panePickerList render threw for ' + def.id, e);
    }
    active = { def, unmount };
  }
  // Mount any plugin that registered before this glue ran.
  for (const def of window.ttyview._internal.registries.panePickerList.values()) {
    mount(def); break;       // first one wins
  }
  window.ttyview.on('panePickerList-registered', function(def) {
    if (!active) mount(def);
  });
  window.ttyview.on('panePickerList-unregistered', function(def) {
    if (active && active.def.id === def.id) unmountActive();
  });
})();

// === Diagnostic logging ===
// Lightweight client telemetry for debugging. Buffered locally,
// flushed via WS every 1s OR when the buffer hits 64 events.
// Server drops them silently unless --diag-log is set on the
// daemon (privacy default). Events MUST contain only metadata —
// no cell content, no user input text.
const ttvDiagBuf = [];
let ttvDiagFlushScheduled = false;
function ttvDiag(category, data) {
  ttvDiagBuf.push({
    ts: Date.now(),
    cat: category,
    ...data,
  });
  if (ttvDiagBuf.length >= 64) {
    ttvDiagFlush();
  } else if (!ttvDiagFlushScheduled) {
    ttvDiagFlushScheduled = true;
    setTimeout(() => { ttvDiagFlushScheduled = false; ttvDiagFlush(); }, 1000);
  }
}
function ttvDiagFlush() {
  if (!ttvDiagBuf.length) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const events = ttvDiagBuf.splice(0, ttvDiagBuf.length);
  ws.send(JSON.stringify({ t: 'diag', events }));
}
// Send any pending events before the page closes (mobile tab swap, reload).
window.addEventListener('pagehide', ttvDiagFlush);
window.addEventListener('beforeunload', ttvDiagFlush);
// Capture uncaught errors
window.addEventListener('error', (e) => {
  ttvDiag('error', { msg: String(e.message), src: e.filename, line: e.lineno });
});

// Main-thread-stall detector. setInterval fires every 100ms; if it
// fires LATE by >250ms, the main thread was blocked. Helps tell
// "the browser was busy for X ms" from "JS was busy for X ms".
let lastStallTick = performance.now();
setInterval(() => {
  const now = performance.now();
  const expected = lastStallTick + 100;
  const stall = now - expected;
  lastStallTick = now;
  if (stall > 250) {
    ttvDiag('stall', { dur_ms: +stall.toFixed(0) });
  }
}, 100);
// Cap diff-flush size so a giant batch can't itself become a stall.
// If panel ever sends a really big diff (e.g. on first connect),
// process at most N cells per frame, deferring the rest.
window.__ttvDiagBuf = ttvDiagBuf;

function setStatus(text, cls) {
  $status.textContent = text;
  $status.className = 'status' + (cls ? ' ' + cls : '');
}

let panesCache = [];

// Active-pane button label. Just the session name when unambiguous;
// adds a "(N)" suffix when the same session has multiple panes (1-
// indexed by position in panesCache for stable numbering across
// renders). Pane id + size were noise for most users — `%10` is
// cryptic and the size shows in the daemon status line + picker
// meta line. The disambiguation suffix is the cheapest fallback
// that doesn't lose meaning when there ARE duplicates.
function paneLabel(p) {
  if (!p) return '—';
  const same = panesCache.filter(x => x.session === p.session);
  if (same.length <= 1) return p.session;
  const idx = same.findIndex(x => x.id === p.id);
  return p.session + ' (' + (idx + 1) + ')';
}

function updatePaneLabel() {
  const $lbl = document.getElementById('pane-picker-label');
  const p = panesCache.find(x => x.id === activePaneId);
  $lbl.textContent = p ? paneLabel(p) : (activePaneId || '—');
}

function renderPanePickerList() {
  const $list = document.getElementById('pane-picker-list');
  $list.innerHTML = '';
  for (const p of panesCache) {
    const same = panesCache.filter(x => x.session === p.session);
    const idx = same.findIndex(x => x.id === p.id);
    const item = document.createElement('div');
    item.className = 'pp-item' + (p.id === activePaneId ? ' active' : '');
    item.setAttribute('role', 'option');
    item.setAttribute('data-pane-id', p.id);
    const sess = document.createElement('span');
    sess.className = 'pp-session';
    // Same disambiguation rule as paneLabel — keeps the picker and
    // the active-button label visually consistent.
    sess.textContent = same.length > 1 ? p.session + ' (' + (idx + 1) + ')' : p.session;
    // Dim meta line under each row — keeps the verbose detail
    // (pane id, window, size) reachable for power users without
    // putting it in everyone's face.
    const meta = document.createElement('span');
    meta.className = 'pp-meta';
    const parts = [p.id];
    if (p.window != null) parts.push('w' + p.window);
    parts.push(p.cols + '×' + p.rows);
    meta.textContent = parts.join(' · ');
    item.appendChild(sess);
    item.appendChild(meta);
    item.addEventListener('click', function() {
      closePanePicker();
      // Synchronously dispatch the selection — selectPane shows the
      // loading state in the same frame.
      selectPane(p.id);
    });
    $list.appendChild(item);
  }
}

function openPanePicker() {
  const t0 = performance.now();
  // If a panePickerList plugin is mounted, the slot is already populated
  // and self-managing (re-renders on panes-updated / pane-changed). Skip
  // the inline render in that case. Otherwise fall back to the built-in
  // arbitrary-order listing for backwards compat.
  const hasPlugin = window.ttyview._internal.registries.panePickerList.size > 0;
  if (!hasPlugin) renderPanePickerList();
  const t1 = performance.now();
  document.getElementById('pane-picker-overlay').classList.add('open');
  document.getElementById('pane-picker-btn').setAttribute('aria-expanded', 'true');
  const t2 = performance.now();
  // Tell plugins that the picker just opened — useful for re-rendering
  // recency timestamps as the user interacts with it.
  try { window.ttyview._internal.emit('panePicker-opened', {}); } catch {}
  // After current frame paints, log when the user could ACTUALLY see it.
  requestAnimationFrame(() => {
    const t3 = performance.now();
    ttvDiag('picker-open', {
      render_ms: +(t1 - t0).toFixed(2),
      class_ms: +(t2 - t1).toFixed(2),
      paint_ms: +(t3 - t2).toFixed(2),
      total_ms: +(t3 - t0).toFixed(2),
      pane_count: panesCache.length,
      plugin: hasPlugin,
    });
  });
}
function closePanePicker() {
  document.getElementById('pane-picker-overlay').classList.remove('open');
  document.getElementById('pane-picker-btn').setAttribute('aria-expanded', 'false');
  try { window.ttyview._internal.emit('panePicker-closed', {}); } catch {}
}

async function loadPanes() {
  try {
    const r = await fetch('/panes');
    const list = await r.json();
    panesCache = list || [];
    try { window.ttyview._internal.emit('panes-updated', panesCache.slice()); } catch {}
    $select.innerHTML = '';
    if (!list || list.length === 0) {
      $empty.innerHTML = 'No tmux sessions found. Start one with <code>tmux new-session -s mywork</code> and refresh.';
      $empty.style.display = 'block';
      updatePaneLabel();
      return [];
    }
    // Mirror into hidden <select> so the contract test (and any
    // assistive tech) sees the options.
    for (const p of list) {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = paneLabel(p);
      $select.appendChild(opt);
    }
    updatePaneLabel();
    return list;
  } catch (e) {
    setStatus('error: ' + e.message, 'error');
    return [];
  }
}

async function loadGrid(paneId) {
  setStatus('loading…');
  try {
    // max_scrollback=200 → ~4-5 viewports of history. Diag log showed
    // even at 500 rows (30k cells), mobile Chrome paint stalled
    // ~1.7s when the picker overlay opacity changed. Going to 200
    // (~12k cells) puts us comfortably below the threshold. v0.0.3
    // will add lazy-load-more on scroll-to-top to support reading
    // deeper history without paying the upfront DOM cost.
    const r = await fetch('/panes/' + encodeURIComponent(paneId) + '/grid?max_scrollback=200');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const screen = await r.json();
    // Phase 2: terminal-view plugin owns the rendering. Core just
    // emits 'grid-loaded'; cell-grid (the default plugin) listens.
    try { window.ttyview._internal.emit('grid-loaded', { paneId, screen }); } catch (e) {
      console.error('grid-loaded handler threw', e);
    }
    setStatus('loaded ' + paneId, 'connected');
  } catch (e) {
    setStatus('grid error: ' + e.message, 'error');
  }
}

function connectWs() {
  if (ws) { try { ws.close(); } catch (e) {} }
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');
  ttvDiag('ws', { ev: 'connecting', retry_ms: wsRetryMs });
  ws.onopen = function() {
    setStatus('connected', 'connected');
    wsRetryMs = 1000;
    ttvDiag('ws', { ev: 'open', pane: activePaneId });
    if (activePaneId) {
      ws.send(JSON.stringify({ t: 'sub', p: activePaneId }));
    }
  };
  ws.onmessage = function(ev) {
    let msg;
    try { msg = JSON.parse(ev.data); } catch (e) { return; }
    if (msg.p !== activePaneId) return;
    if (msg.t === 'cell-diff') {
      // Phase 2: forward to the terminal-view plugin via event.
      // Plugin handles rAF batching internally — keeps coalescing
      // logic next to the DOM it writes to.
      try { window.ttyview._internal.emit('cell-diff', msg); } catch (e) {
        console.error('cell-diff handler threw', e);
      }
    } else if (msg.t === 'grid-reset') {
      loadGrid(activePaneId);
    } else if (msg.t === 'scrollback-append') {
      try { window.ttyview._internal.emit('scrollback-append', msg); } catch (e) {
        console.error('scrollback-append handler threw', e);
      }
    }
  };
  ws.onclose = function(ev) {
    ttvDiag('ws', { ev: 'close', code: ev?.code, reason: ev?.reason || '', clean: !!ev?.wasClean, retry_ms: wsRetryMs });
    setStatus('reconnecting in ' + (wsRetryMs/1000) + 's…');
    setTimeout(connectWs, wsRetryMs);
    wsRetryMs = Math.min(wsRetryMs * 2, 15000);
  };
  ws.onerror = function() {
    ttvDiag('ws', { ev: 'error' });
    setStatus('ws error', 'error');
  };
}

async function selectPane(paneId) {
  if (paneId === activePaneId) return;
  const t0 = performance.now();
  const prevPaneId = activePaneId;
  activePaneId = paneId;
  // Plugin event: pane-changed (synchronous, before async work)
  try { window.ttyview._internal.emit('pane-changed', { from: prevPaneId, to: paneId }); } catch {}
  // Persist for next reload. Stored by pane id (e.g. "%6"), but we
  // also save the session name so we can pick the same session even
  // if tmux reassigns pane ids on a server restart.
  try {
    const p = panesCache.find(x => x.id === paneId);
    localStorage.setItem('ttv-last-pane-id', paneId);
    if (p) localStorage.setItem('ttv-last-session', p.session);
  } catch {}
  // Phase 2: plugin owns the DOM. Emit pane-clearing so cell-grid
  // (or any other terminal-view plugin) can wipe its state.
  try { window.ttyview._internal.emit('pane-clearing', { from: prevPaneId, to: paneId }); } catch (e) {
    console.error('pane-clearing handler threw', e);
  }
  $host.classList.add('loading');
  updatePaneLabel();
  setStatus('loading ' + paneId + '…');
  if (ws && ws.readyState === WebSocket.OPEN && prevPaneId) {
    ws.send(JSON.stringify({ t: 'unsub', p: prevPaneId }));
  }
  const tSync = performance.now();
  await loadGrid(paneId);
  const tFetch = performance.now();
  $host.classList.remove('loading');
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ t: 'sub', p: paneId }));
  }
  ttvDiag('pane-switch', {
    from: prevPaneId, to: paneId,
    sync_ms: +(tSync - t0).toFixed(2),
    fetch_ms: +(tFetch - tSync).toFixed(2),
    total_ms: +(performance.now() - t0).toFixed(2),
  });
}

// Hidden select still works for screen-readers + tests
$select.addEventListener('change', function() { selectPane($select.value); });
// Custom picker
document.getElementById('pane-picker-btn').addEventListener('click', function() {
  ttvDiag('picker-click', {});
  openPanePicker();
});
// Capture taps from the user. We log target info so a "click went
// nowhere" bug can be reconstructed from the diag log (which element
// was hit, which plugin owned it, did a click event ALSO fire).
function describeTapTarget(el) {
  if (!el || !el.closest) return null;
  // Walk up to the nearest interactive element so we get the BUTTON
  // or [data-plugin-id] container, not a child <span>.
  const interactive = el.closest('button, [role="button"], [data-plugin-id], a');
  const t = interactive || el;
  return {
    tag: (t.tagName || '').toLowerCase(),
    id: t.id || null,
    cls: (t.className && t.className.toString && t.className.toString().slice(0, 64)) || null,
    plugin: t.closest('[data-plugin-id]')?.dataset?.pluginId || null,
    text: ((t.textContent || '').trim().slice(0, 40)) || null,
  };
}
document.addEventListener('touchstart', function(e) {
  ttvDiag('tap', { target: describeTapTarget(e.target) });
}, { passive: true, capture: true });
// Also capture click — if click DOESN'T fire after touchstart on a
// button, that's the synthetic-click-suppression bug we keep hitting
// when handlers preventDefault on touchstart.
document.addEventListener('click', function(e) {
  ttvDiag('click', { target: describeTapTarget(e.target) });
}, { passive: true, capture: true });
document.getElementById('pane-picker-overlay').addEventListener('click', function(e) {
  // Tap outside the panel closes
  if (e.target.id === 'pane-picker-overlay') closePanePicker();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closePanePicker();
});
$refresh.addEventListener('click', async function() {
  await loadPanes();
  if (activePaneId) await loadGrid(activePaneId);
});

// === Font size controls ===
let currentFontPx = parseFloat(localStorage.getItem('ttv-font-size')) || 12;
let autoFitOn = localStorage.getItem('ttv-autofit') !== 'false'; // default on

// Pane width comes from panesCache (panel daemon is authoritative).
// Was a tracked-from-buildGrid variable in Phase 1; now part of the
// platform contract so the plugin doesn't need to push it back.
function getActivePaneCols() {
  const p = panesCache.find(x => x.id === activePaneId);
  return (p && p.cols) || 80;
}

function applyFont(px) {
  currentFontPx = Math.max(8, Math.min(28, px));
  document.documentElement.style.setProperty('--ttv-font-size', currentFontPx + 'px');
  localStorage.setItem('ttv-font-size', String(currentFontPx));
}

function measureCharWidth() {
  // Build a hidden probe with the current font and measure its rendered width.
  const probe = document.createElement('span');
  probe.style.cssText = 'position:absolute;visibility:hidden;white-space:pre;font-family:' +
    "'JetBrains Mono','Cascadia Code','Fira Code',Menlo,Consolas,monospace;font-size:" +
    currentFontPx + 'px';
  probe.textContent = 'M'.repeat(40);
  document.body.appendChild(probe);
  const w = probe.getBoundingClientRect().width / 40;
  probe.remove();
  return w;
}

function autoFit() {
  if (!autoFitOn) return;
  const styles = getComputedStyle($host);
  const padL = parseFloat(styles.paddingLeft) || 0;
  const padR = parseFloat(styles.paddingRight) || 0;
  // Account for vertical scrollbar width if present (~12-15 px on mobile).
  const sbWidth = $host.offsetWidth - $host.clientWidth;
  const avail = $host.clientWidth - padL - padR - sbWidth;
  const cols = getActivePaneCols();
  if (avail <= 0 || cols <= 0) return;
  const charW = measureCharWidth();
  if (!charW || charW <= 0) return;
  // Pick the largest font that fits pane_cols × charW into avail.
  // Iterate down from current; cheaper than a math derivation that
  // assumes linear scaling (font metrics aren't perfectly linear).
  const targetCharW = avail / cols;
  const ratio = targetCharW / charW;
  const target = Math.max(8, Math.min(28, Math.floor(currentFontPx * ratio)));
  if (target !== currentFontPx) applyFont(target);
}

document.getElementById('font-down').addEventListener('click', function() {
  autoFitOn = false; localStorage.setItem('ttv-autofit', 'false');
  applyFont(currentFontPx - 1);
});
document.getElementById('font-up').addEventListener('click', function() {
  autoFitOn = false; localStorage.setItem('ttv-autofit', 'false');
  applyFont(currentFontPx + 1);
});
document.getElementById('font-fit').addEventListener('click', function() {
  autoFitOn = true; localStorage.setItem('ttv-autofit', 'true');
  autoFit();
});
document.getElementById('scroll-bottom').addEventListener('click', function() {
  $host.scrollTop = $host.scrollHeight;
});

// Re-fit on viewport resize (orientation, address-bar collapse, keyboard).
window.addEventListener('resize', autoFit, { passive: true });
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', autoFit, { passive: true });
}

applyFont(currentFontPx);

// =============================================================
// Plugin install / uninstall / boot-loader
// =============================================================
//
// Installed plugins live on the daemon's filesystem at
// `~/.config/ttyview/plugins/`. The daemon serves the index at
// /plugins/installed and source at /plugins/installed/:id/source.
// We fetch + eval them at boot so they can register contributions
// before the platform finishes bootstrapping.
async function installPlugin(id) {
  const res = await fetch('/plugins/install', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ id }),
  });
  if (!res.ok) {
    const txt = await res.text().catch(() => '');
    throw new Error('install ' + id + ' → HTTP ' + res.status + ' ' + txt);
  }
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'install failed');
  // Eval the installed source immediately so the user sees the
  // plugin take effect without a reload.
  await loadInstalledPlugin(data.plugin.id);
  return data.plugin;
}

async function uninstallPlugin(id) {
  const res = await fetch('/plugins/uninstall/' + encodeURIComponent(id), {
    method: 'DELETE',
  });
  if (!res.ok) {
    const txt = await res.text().catch(() => '');
    throw new Error('uninstall ' + id + ' → HTTP ' + res.status + ' ' + txt);
  }
  // Best-effort live-uninstall: walk every contribution registry and
  // tear down any item whose ID matches the plugin's. Most plugins
  // register a single contribution under their own id, so this works
  // for the common case. (Multi-contribution plugins would need a
  // proper plugin manifest with explicit contributed ids — v2.)
  const reg = window.ttyview._internal.registries;
  for (const map of [reg.terminalView, reg.headerWidget, reg.settingsTab, reg.command, reg.theme]) {
    if (map.has(id)) {
      const def = map.get(id);
      map.delete(id);
      // Re-derive the registry kind from the map identity so we emit
      // the correctly named -unregistered event (header-widget mounter,
      // settings tab tabs(), etc. listen for these).
      const kind = (map === reg.terminalView) ? 'terminalView'
        : (map === reg.headerWidget) ? 'headerWidget'
        : (map === reg.settingsTab) ? 'settingsTab'
        : (map === reg.command) ? 'command'
        : 'theme';
      window.ttyview._internal.emit(kind + '-unregistered', def);
    }
  }
  return true;
}

async function loadInstalledPlugin(id) {
  const res = await fetch('/plugins/installed/' + encodeURIComponent(id) + '/source');
  if (!res.ok) throw new Error('load source ' + id + ' → HTTP ' + res.status);
  const src = await res.text();
  // eval inside an IIFE so module-scope vars don't leak. This is the
  // same trust model as a <script src> tag — the daemon controls what
  // /plugins/installed serves, and that comes from a directory the
  // user explicitly installs into.
  try {
    new Function(src)();
  } catch (e) {
    console.error('plugin ' + id + ' eval threw:', e);
    throw e;
  }
}

async function loadAllInstalledPlugins() {
  try {
    const res = await fetch('/plugins/installed');
    if (!res.ok) return;
    const data = await res.json();
    const plugins = data.plugins || [];
    for (const p of plugins) {
      // Skip disabled plugins. The source stays on disk; the user can
      // flip enabled back on at any time without losing per-plugin
      // storage. Older installed.json files (before the field existed)
      // get default true via serde — preserves prior behavior.
      if (p.enabled === false) continue;
      try { await loadInstalledPlugin(p.id); }
      catch (e) { console.error('failed to boot-load plugin ' + p.id, e); }
    }
  } catch (e) {
    console.error('loadAllInstalledPlugins:', e);
  }
}

async function setPluginEnabled(id, enabled) {
  // POST the enabled flag to the daemon, then live-toggle: tear down
  // contributions when disabling (mirrors the uninstall path but
  // leaves the file + index entry intact), or fetch+eval the source
  // when enabling. Per-plugin storage is untouched in either branch.
  const res = await fetch('/plugins/installed/' + encodeURIComponent(id) + '/enabled', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ enabled: !!enabled }),
  });
  if (!res.ok) {
    const txt = await res.text().catch(() => '');
    throw new Error('set enabled ' + id + ' → HTTP ' + res.status + ' ' + txt);
  }
  if (enabled) {
    // Re-eval source so contributions register live.
    await loadInstalledPlugin(id);
  } else {
    // Mirror the uninstall live-tear-down: walk every contribution
    // registry and unregister entries with id matching this plugin.
    const reg = window.ttyview._internal.registries;
    for (const map of [reg.terminalView, reg.headerWidget, reg.tabBar, reg.inputAccessory, reg.settingsTab, reg.command, reg.theme]) {
      if (map && map.has(id)) {
        const def = map.get(id);
        map.delete(id);
        const kind = (map === reg.terminalView) ? 'terminalView'
          : (map === reg.headerWidget) ? 'headerWidget'
          : (map === reg.tabBar) ? 'tabBar'
          : (map === reg.inputAccessory) ? 'inputAccessory'
          : (map === reg.settingsTab) ? 'settingsTab'
          : (map === reg.command) ? 'command'
          : 'theme';
        window.ttyview._internal.emit(kind + '-unregistered', def);
      }
    }
  }
  return true;
}

// =============================================================
// Settings overlay
// =============================================================
//
// Reads the plugin registries and renders them as a tabbed list.
// Plugins can also register their own settings tab via
// ttyview.contributes.settingsTab(...).

(function() {
  const $overlay = document.getElementById('settings-overlay');
  const $tabs    = document.getElementById('settings-tabs');
  const $body    = document.getElementById('settings-body');
  const $btn     = document.getElementById('settings-btn');
  const $close   = document.getElementById('settings-close');

  let activeTabId = 'plugins';

  function open() {
    activeTabId = activeTabId || 'plugins';
    render();
    $overlay.classList.add('open');
  }
  function close() { $overlay.classList.remove('open'); }

  $btn.addEventListener('click', open);
  $close.addEventListener('click', close);
  $overlay.addEventListener('click', function(e) {
    if (e.target.id === 'settings-overlay') close();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && $overlay.classList.contains('open')) close();
  });

  function tabs() {
    // Built-in tabs first; then any plugin-contributed tabs.
    const list = [
      { id: 'plugins',  title: 'Plugins' },
      { id: 'discover', title: 'Discover' },
      { id: 'layout',   title: 'Layout' },
      { id: 'about',    title: 'About' },
    ];
    const reg = window.ttyview._internal.registries.settingsTab;
    for (const def of reg.values()) {
      list.splice(list.length - 1, 0, { id: def.id, title: def.title, plugin: def });
    }
    return list;
  }

  function render() {
    $tabs.innerHTML = '';
    for (const t of tabs()) {
      const b = document.createElement('button');
      b.className = 'tab' + (t.id === activeTabId ? ' active' : '');
      b.textContent = t.title;
      b.addEventListener('click', function() {
        activeTabId = t.id;
        render();
      });
      $tabs.appendChild(b);
    }
    const t = tabs().find(function(x) { return x.id === activeTabId; });
    $body.innerHTML = '';
    if (!t) return;
    if (t.id === 'plugins') {
      renderPluginsTab($body);
    } else if (t.id === 'discover') {
      renderDiscoverTab($body);
    } else if (t.id === 'layout') {
      renderLayoutTab($body);
    } else if (t.id === 'about') {
      renderAboutTab($body);
    } else if (t.plugin) {
      try { t.plugin.render($body); } catch (e) {
        $body.textContent = 'plugin settings render error: ' + e.message;
      }
    }
  }

  function renderPluginsTab(el) {
    const reg = window.ttyview._internal.registries;
    const sections = [
      { title: 'Terminal views', map: reg.terminalView },
      { title: 'Tab bars',       map: reg.tabBar },
      { title: 'Header widgets', map: reg.headerWidget },
      { title: 'Input accessories', map: reg.inputAccessory },
      { title: 'Settings tabs',  map: reg.settingsTab },
      { title: 'Commands',       map: reg.command },
      { title: 'Themes',         map: reg.theme },
    ];
    for (const sec of sections) {
      const h = document.createElement('h3');
      h.textContent = sec.title + ' (' + sec.map.size + ')';
      el.appendChild(h);
      if (sec.map.size === 0) {
        const p = document.createElement('div');
        p.className = 'empty';
        p.textContent = 'No ' + sec.title.toLowerCase() + ' registered.';
        el.appendChild(p);
        continue;
      }
      for (const def of sec.map.values()) {
        const card = document.createElement('div');
        card.className = 'plugin-card';
        const row = document.createElement('div'); row.className = 'row';
        const name = document.createElement('span'); name.className = 'name';
        name.textContent = def.name || def.title || def.id;
        row.appendChild(name);
        const builtin = document.createElement('span');
        builtin.className = 'badge builtin';
        builtin.textContent = 'built-in';
        row.appendChild(builtin);
        const isActiveTerm = sec.title === 'Terminal views' &&
            def.id === window.ttyview._internal.getActiveTerminalViewId();
        const isActiveTheme = sec.title === 'Themes' &&
            def.id === window.ttyview._internal.getActiveThemeId();
        if (isActiveTerm || isActiveTheme) {
          const active = document.createElement('span');
          active.className = 'badge active';
          active.textContent = 'active';
          row.appendChild(active);
        }
        card.appendChild(row);
        const meta = document.createElement('div'); meta.className = 'meta';
        meta.textContent = 'id: ' + def.id;
        card.appendChild(meta);
        if (def.description) {
          const d = document.createElement('div'); d.className = 'desc';
          d.textContent = def.description;
          card.appendChild(d);
        }
        // Action buttons — themes get Activate/Deactivate, terminal views
        // get Activate. Other contribution kinds are passive (cards are
        // informational only).
        if (sec.title === 'Themes' || sec.title === 'Terminal views') {
          const actions = document.createElement('div');
          actions.style.cssText = 'margin-top:8px;display:flex;gap:8px;';
          const btn = document.createElement('button');
          btn.style.cssText = 'background:var(--ttv-bg-elev2);color:var(--ttv-fg);border:1px solid var(--ttv-border);padding:5px 12px;border-radius:4px;cursor:pointer;font-size:12px;';
          if (sec.title === 'Themes') {
            btn.textContent = isActiveTheme ? 'Deactivate' : 'Activate';
            btn.addEventListener('click', function() {
              window.ttyview._internal.setActiveThemeId(isActiveTheme ? null : def.id);
              render();
            });
          } else {
            btn.textContent = isActiveTerm ? 'Active' : 'Activate';
            btn.disabled = isActiveTerm;
            if (!isActiveTerm) btn.addEventListener('click', function() {
              window.ttyview._internal.setActiveTerminalViewId(def.id);
              render();
            });
          }
          actions.appendChild(btn);
          card.appendChild(actions);
        }
        el.appendChild(card);
      }
    }
  }

  // === Discover tab ===
  // Lists plugins available from the daemon's bundled registry. v1
  // registry is shipped *with* the daemon (offline-friendly, easy to
  // audit). v2 will swap to a remote GitHub-hosted registry.
  async function renderDiscoverTab(el) {
    el.innerHTML = '<div class="empty">Loading…</div>';
    try {
      const [reg, installed] = await Promise.all([
        fetch('/plugins/registry').then(r => r.json()),
        fetch('/plugins/installed').then(r => r.json()),
      ]);
      const installedById = new Map((installed.plugins || []).map(p => [p.id, p]));
      const installedIds = new Set(installedById.keys());
      el.innerHTML = '';
      const intro = document.createElement('p');
      intro.style.cssText = 'color:#888;font-size:12px;margin:0 0 12px;';
      intro.textContent = 'Plugins available from the bundled registry. ' +
        'Install adds them to ~/.config/ttyview/plugins/ and loads them ' +
        'into this page immediately. They re-load on every reload.';
      el.appendChild(intro);
      const plugins = reg.plugins || [];
      if (plugins.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'Registry is empty.';
        el.appendChild(empty);
        return;
      }
      for (const p of plugins) {
        const card = document.createElement('div');
        card.className = 'plugin-card';
        const row = document.createElement('div'); row.className = 'row';
        const name = document.createElement('span'); name.className = 'name';
        name.textContent = p.name;
        row.appendChild(name);
        const kind = document.createElement('span');
        kind.className = 'badge builtin';
        kind.textContent = p.kind;
        row.appendChild(kind);
        if (installedIds.has(p.id)) {
          const inst = document.createElement('span');
          inst.className = 'badge active';
          inst.textContent = 'installed';
          row.appendChild(inst);
          if (installedById.get(p.id)?.enabled === false) {
            const dis = document.createElement('span');
            dis.className = 'badge builtin';
            dis.textContent = 'disabled';
            row.appendChild(dis);
          }
        }
        card.appendChild(row);
        const meta = document.createElement('div'); meta.className = 'meta';
        meta.textContent = 'id: ' + p.id + ' · v' + p.version + ' · ' + p.author;
        card.appendChild(meta);
        const desc = document.createElement('div'); desc.className = 'desc';
        desc.textContent = p.description || '';
        card.appendChild(desc);

        const actions = document.createElement('div');
        actions.style.cssText = 'margin-top:8px;display:flex;gap:8px;';
        const btn = document.createElement('button');
        btn.style.cssText = 'background:#2a2a2a;color:#d4d4d4;border:1px solid #3a3a3a;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:12px;';
        if (installedIds.has(p.id)) {
          btn.textContent = 'Uninstall';
          btn.addEventListener('click', async function() {
            btn.disabled = true;
            btn.textContent = 'Uninstalling…';
            try {
              await uninstallPlugin(p.id);
              renderDiscoverTab(el);  // refresh
            } catch (e) {
              btn.textContent = 'Uninstall failed';
              console.error(e);
            }
          });
          // Enable/Disable — toggle without losing per-plugin storage
          // or removing the file. Disable tears down contributions live;
          // Enable re-evals the source.
          const isEnabled = installedById.get(p.id)?.enabled !== false;
          const toggle = document.createElement('button');
          toggle.textContent = isEnabled ? 'Disable' : 'Enable';
          toggle.style.cssText = btn.style.cssText;
          toggle.addEventListener('click', async function() {
            toggle.disabled = true;
            toggle.textContent = (isEnabled ? 'Disabling…' : 'Enabling…');
            try {
              await setPluginEnabled(p.id, !isEnabled);
              renderDiscoverTab(el);
            } catch (e) {
              toggle.textContent = (isEnabled ? 'Disable failed' : 'Enable failed');
              console.error(e);
            }
          });
          actions.appendChild(toggle);

          // "Reinstall" — pulls the latest bundle source over the
          // on-disk copy. Useful when the daemon ships a fix but the
          // user's installed-plugin file is stale (boot loader serves
          // from disk, not bundle, so a daemon upgrade alone doesn't
          // refresh active plugins).
          const reinstall = document.createElement('button');
          reinstall.textContent = 'Reinstall';
          reinstall.style.cssText = btn.style.cssText;
          reinstall.addEventListener('click', async function() {
            reinstall.disabled = true;
            reinstall.textContent = 'Reinstalling…';
            try {
              // install_inner already retains-replaces the index entry
              // and overwrites the file on disk — a plain install POST
              // is a reinstall when the id already exists.
              await installPlugin(p.id);
              renderDiscoverTab(el);
            } catch (e) {
              reinstall.textContent = 'Reinstall failed';
              console.error(e);
            }
          });
          actions.appendChild(reinstall);
        } else {
          btn.textContent = 'Install';
          btn.addEventListener('click', async function() {
            btn.disabled = true;
            btn.textContent = 'Installing…';
            try {
              await installPlugin(p.id);
              renderDiscoverTab(el);  // refresh
            } catch (e) {
              btn.textContent = 'Install failed';
              console.error(e);
            }
          });
        }
        actions.appendChild(btn);
        card.appendChild(actions);
        el.appendChild(card);
      }
    } catch (e) {
      el.innerHTML = '';
      const err = document.createElement('div');
      err.className = 'empty';
      err.textContent = 'Failed to load registry: ' + e.message;
      el.appendChild(err);
    }
  }

  // === Layout tab ===
  // Lists every currently-mounted widget grouped by slot. Each row has
  // a slot dropdown (changes the widget's slot live) and a Reset button
  // (snaps back to the kind's default). Persisted via the layout map
  // in localStorage['ttv-layout'].
  function renderLayoutTab(el) {
    const layout = window.ttyview._internal.layout;
    if (!layout) {
      el.textContent = 'Layout system not available — older platform build?';
      return;
    }
    const intro = document.createElement('p');
    intro.style.cssText = 'color:var(--ttv-muted);font-size:12px;margin:0 0 16px;';
    intro.textContent = 'Move widgets between the four named slots. Changes apply immediately and persist across reloads. Plugins not currently mounted (uninstalled, or not yet loaded) don\'t appear here.';
    el.appendChild(intro);

    const widgets = layout.getMounted();
    // Group by slot for readability.
    const bySlot = {};
    for (const s of layout.SLOTS) bySlot[s.id] = [];
    for (const w of widgets) {
      (bySlot[w.slotId] || (bySlot[w.slotId] = [])).push(w);
    }

    for (const slot of layout.SLOTS) {
      const h = document.createElement('h3');
      h.textContent = slot.name + ' (' + (bySlot[slot.id]?.length || 0) + ')';
      el.appendChild(h);
      const items = bySlot[slot.id] || [];
      if (items.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = '—';
        el.appendChild(empty);
        continue;
      }
      for (const w of items) {
        const card = document.createElement('div');
        card.className = 'plugin-card';
        const row = document.createElement('div'); row.className = 'row';
        const name = document.createElement('span'); name.className = 'name';
        name.textContent = w.name;
        row.appendChild(name);
        const kindBadge = document.createElement('span');
        kindBadge.className = 'badge builtin';
        kindBadge.textContent = w.kind;
        row.appendChild(kindBadge);
        const defaultSlot = layout.KIND_DEFAULT_SLOT[w.kind];
        if (w.slotId !== defaultSlot) {
          const moved = document.createElement('span');
          moved.className = 'badge active';
          moved.textContent = 'moved';
          row.appendChild(moved);
        }
        card.appendChild(row);
        const meta = document.createElement('div'); meta.className = 'meta';
        meta.textContent = 'id: ' + w.pluginId;
        card.appendChild(meta);

        const ctrl = document.createElement('div');
        ctrl.style.cssText = 'margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;';
        const lbl = document.createElement('label');
        lbl.style.cssText = 'color:var(--ttv-muted);font-size:12px;';
        lbl.textContent = 'Slot:';
        const sel = document.createElement('select');
        sel.style.cssText = 'background:var(--ttv-bg-elev2);color:var(--ttv-fg);border:1px solid var(--ttv-border);padding:5px 8px;border-radius:4px;font-size:12px;';
        for (const s of layout.SLOTS) {
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = s.name + (s.id === defaultSlot ? '  (default for ' + w.kind + ')' : '');
          if (s.id === w.slotId) opt.selected = true;
          sel.appendChild(opt);
        }
        sel.addEventListener('change', function() {
          try {
            layout.setSlot(w.pluginId, sel.value);
            renderLayoutTab(el);  // refresh so badges update
          } catch (e) {
            console.error('setSlot:', e);
            sel.value = w.slotId;  // revert dropdown
          }
        });
        ctrl.appendChild(lbl);
        ctrl.appendChild(sel);

        if (w.slotId !== defaultSlot) {
          const reset = document.createElement('button');
          reset.style.cssText = 'background:var(--ttv-bg-elev2);color:var(--ttv-fg);border:1px solid var(--ttv-border);padding:5px 12px;border-radius:4px;cursor:pointer;font-size:12px;';
          reset.textContent = 'Reset';
          reset.addEventListener('click', function() {
            layout.resetSlot(w.pluginId);
            renderLayoutTab(el);
          });
          ctrl.appendChild(reset);
        }
        card.appendChild(ctrl);
        el.appendChild(card);
      }
    }
  }

  function renderAboutTab(el) {
    const w = window.ttyview;
    const t = document.createElement('table');
    const rows = [
      ['ttyview API version', String(w.apiVersion)],
      ['Connected pane',     activePaneId || '(none)'],
      ['Panes available',    String(panesCache.length)],
      ['Terminal views',     String(w._internal.registries.terminalView.size)],
      ['Active terminal',    w._internal.getActiveTerminalViewId() || '(none)'],
    ];
    for (const [k, v] of rows) {
      const tr = document.createElement('tr');
      const th = document.createElement('th'); th.textContent = k;
      const td = document.createElement('td'); td.textContent = v;
      tr.appendChild(th); tr.appendChild(td); t.appendChild(tr);
    }
    el.appendChild(t);
    const note = document.createElement('p');
    note.style.marginTop = '16px';
    note.style.color = '#888';
    note.style.fontSize = '12px';
    note.innerHTML =
      'ttyview is a thin platform for terminal-pane viewing. ' +
      'Everything user-facing is a plugin: terminal views, themes, ' +
      'correlators, commands. ' +
      '<a href="https://github.com/ttyview" style="color:#6ed29a">github.com/ttyview</a>';
    el.appendChild(note);
  }

  // Re-render the open overlay when registries change.
  ['terminalView-registered', 'terminalView-unregistered',
   'settingsTab-registered',  'settingsTab-unregistered',
   'command-registered',      'command-unregistered',
   'theme-registered',        'theme-unregistered',
  ].forEach(function(ev) {
    window.ttyview.on(ev, function() {
      if ($overlay.classList.contains('open')) render();
    });
  });
})();

// =============================================================
// Cell-grid: registered as the default terminal-view plugin
// =============================================================
//
// Phase 2: rendering lives entirely inside def.render(host, ctx).
// The plugin owns its DOM (sb-host + primary-host children of host),
// its cell map, its rAF batching. Core just emits events; this
// plugin listens and reacts. Replacing it is one
// `setActiveTerminalViewId('other-id')` away.
window.ttyview.contributes.terminalView({
  id: 'cell-grid',
  name: 'Cell Grid',
  description: 'DOM cell-grid renderer with frozen scrollback. ' +
    'Mobile-first paint optimizations. The default view shipped with ttyview.',
  render: function(host, ctx) {
    // === Plugin-private DOM ===
    host.innerHTML = '';
    const $empty = document.createElement('div');
    $empty.id = 'empty-msg';
    $empty.textContent = 'Loading panes…';
    const $sbHost = document.createElement('div');
    $sbHost.id = 'sb-host';
    const $primaryHost = document.createElement('div');
    $primaryHost.id = 'primary-host';
    host.appendChild($empty);
    host.appendChild($sbHost);
    host.appendChild($primaryHost);

    // === Plugin-private state ===
    let cells = new Map();   // "r,c" -> <span>
    let pendingDiffs = [];
    let diffRafId = 0;

    // === Color decoding ===
    // Panel serializes colors as Rust enum variants with default
    // external tagging:
    //   default     → null (or omitted)
    //   palette N   → { "Indexed": N }     (0..255 — 16 ANSI + 6×6×6 cube + grayscale)
    //   true color  → { "Rgb": { "r": R, "g": G, "b": B } }
    // (Some serializations also produce string "Default" — handle defensively.)
    const TTV_PALETTE_16 = [
      '#000000', '#cd0000', '#00cd00', '#cdcd00', '#0000ee', '#cd00cd', '#00cdcd', '#e5e5e5',
      '#7f7f7f', '#ff0000', '#00ff00', '#ffff00', '#5c5cff', '#ff00ff', '#00ffff', '#ffffff',
    ];
    function indexedToCss(idx) {
      if (idx < 16) return TTV_PALETTE_16[idx];
      if (idx < 232) {
        const i = idx - 16;
        const r = Math.floor(i / 36) * 51;
        const g = Math.floor((i % 36) / 6) * 51;
        const b = (i % 6) * 51;
        return 'rgb(' + r + ',' + g + ',' + b + ')';
      }
      const v = (idx - 232) * 10 + 8;
      return 'rgb(' + v + ',' + v + ',' + v + ')';
    }
    function colorToCss(color) {
      if (color == null) return null;
