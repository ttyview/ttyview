<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>ttyview</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #1e1e1e; color: #d4d4d4; font-family: system-ui, sans-serif; }
  body { display: flex; flex-direction: column; }

  header {
    flex: none;
    padding: 6px 8px;
    background: #0d0d0d;
    border-bottom: 1px solid #333;
    display: flex; align-items: center; gap: 4px;
    font-size: 13px;
  }
  header .title { font-weight: 600; color: #6ed29a; }
  header .sep { color: #666; }
  header select, header button {
    background: #2d2d2d;
    color: #d4d4d4;
    border: 1px solid #444;
    border-radius: 4px;
    padding: 4px 8px;
    font: inherit;
    cursor: pointer;
  }
  header select:hover, header button:hover { background: #3d3d3d; }
  /* Compact "kebab" overflow menu collapses minor controls on narrow
     viewports so the picker button gets enough horizontal room. */
  header #more-menu {
    position: relative;
  }
  header #more-menu-btn { padding: 4px 8px; }
  header #more-menu-panel {
    position: absolute; top: 100%; right: 0;
    margin-top: 4px;
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 6px;
    display: none;
    flex-direction: column;
    gap: 4px;
    z-index: 50;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
  }
  header #more-menu-panel.open { display: flex; }
  header #more-menu-panel button {
    width: 100%;
    text-align: left;
    padding: 6px 10px;
  }
  header #more-menu-panel .row {
    display: flex; gap: 4px;
    border-bottom: 1px solid #2a2a2a;
    padding-bottom: 6px; margin-bottom: 2px;
  }
  header #more-menu-panel .row:last-child {
    border-bottom: none; padding-bottom: 0; margin-bottom: 0;
  }
  header #more-menu-panel .row button { flex: 1; text-align: center; min-width: 32px; }

  /* Custom in-app pane picker (replaces native <select>) */
  #pane-picker-btn {
    flex: 1; min-width: 0;
    text-align: left;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 10px;
    background: #2d2d2d;
    color: #d4d4d4;
    border: 1px solid #444;
    border-radius: 4px;
    font: inherit;
    cursor: pointer;
    overflow: hidden;
  }
  #pane-picker-btn:hover { background: #3d3d3d; }
  #pane-picker-btn .label {
    flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #pane-picker-btn .chev { color: #888; font-size: 0.8em; }

  #pane-picker-overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.55);
    z-index: 100;
    display: flex;                /* always laid out — no display:none toggle */
    flex-direction: column;
    justify-content: flex-end;
    /* Hide via translate (off-screen), not opacity, so the overlay
       stays at 100% paint cost only when shown. translate3d is
       cheap (compositor-only) and reliably promotes to its own
       layer on mobile Chrome. opacity transitions caused multi-
       second paint stalls on the user's phone — see diag log
       2026-05-08 18:08 (paint_ms=6015→1746 with prior opacity-
       only approach). */
    transform: translateY(100%);
    pointer-events: none;
    transition: transform 150ms ease-out;
    /* Force a layer */
    will-change: transform;
    isolation: isolate;
  }
  #pane-picker-overlay.open {
    transform: translateY(0);
    pointer-events: auto;
  }
  #pane-picker-panel {
    background: #1a1a1a;
    border-top: 1px solid #444;
    border-radius: 12px 12px 0 0;
    max-height: 80vh;
    /* Account for iOS/Android home indicator + insets when present */
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom)) 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.5);
  }
  #pane-picker-panel .pp-header {
    padding: 8px 16px 12px;
    color: #888; font-size: 12px;
    border-bottom: 1px solid #2a2a2a;
  }
  #pane-picker-panel .pp-item {
    display: flex; align-items: center;
    padding: 14px 16px;
    cursor: pointer;
    color: #d4d4d4;
    border-bottom: 1px solid #222;
    font-size: 14px;
  }
  #pane-picker-panel .pp-item:hover, #pane-picker-panel .pp-item.active {
    background: #2a2a2a;
  }
  #pane-picker-panel .pp-item.active { color: #6ed29a; }
  #pane-picker-panel .pp-item .pp-session {
    flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-weight: 500;
  }
  #pane-picker-panel .pp-item .pp-meta {
    color: #888; font-size: 12px; margin-left: 8px;
  }

  /* Loading skeleton inside the grid host while a switch is in flight */
  #grid-host.loading::after {
    content: 'Loading pane…';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #888;
    font-family: system-ui, sans-serif;
    font-size: 14px;
    pointer-events: none;
  }
  #grid-host { position: relative; }
  header .font-ctl { display: flex; gap: 2px; }
  header .font-ctl button { padding: 4px 6px; min-width: 26px; }
  header .status {
    margin-left: 4px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #888;
    display: inline-block;
    flex: none;
    transition: background-color 200ms;
    overflow: hidden;
    text-indent: -9999px;       /* hide the literal text content */
  }
  header .status.connected { background: #6ed29a; }
  header .status.error { background: #f48771; }
  /* Hide brand title on narrow viewports — picker button gets the space. */
  @media (max-width: 600px) {
    header .title, header .sep { display: none; }
    header { padding: 6px 6px; }
  }

  #grid-host {
    flex: 1;
    overflow: auto;
    contain: layout style;
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', Menlo, Consolas, monospace;
    font-size: var(--ttv-font-size, 12px);
    line-height: 1.25;
    padding: 4px 6px;
    -webkit-font-smoothing: antialiased;
    touch-action: pan-y;
  }

  /* Input row at bottom — send keys back to tmux. */
  #input-row {
    flex: none;
    display: flex;
    gap: 6px;
    padding: 6px 8px;
    background: #0d0d0d;
    border-top: 1px solid #333;
  }
  #input-row textarea {
    flex: 1;
    resize: none;
    min-height: 36px;
    max-height: 120px;
    padding: 6px 10px;
    background: #252526;
    color: #d4d4d4;
    border: 1px solid #444;
    border-radius: 6px;
    font-family: system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.4;
    outline: none;
  }
  #input-row textarea:focus { border-color: #4ec9b0; }
  #input-row textarea::placeholder { color: #666; }
  #send-btn {
    flex: none;
    padding: 0 14px;
    background: #4ec9b0;
    color: #0d0d0d;
    border: none;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
  }
  #send-btn:hover { background: #5fdac1; }
  #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .ttv-row {
    display: block;
    white-space: pre;
    min-height: 1.25em;
    contain: layout style paint;
  }
  /* Frozen scrollback rows — once written, never mutated. Off-screen
     rows skip layout/paint via content-visibility (browsers that don't
     support it just render normally). */
  .ttv-row.frozen {
    content-visibility: auto;
    contain-intrinsic-size: auto 1.25em;
  }
  .ttv-cell {
    display: inline-block;
    width: 1ch;
  }
  .ttv-cell-w0 { width: 0; }
  .ttv-cell-w2 { width: 2ch; }
  #sb-host { display: block; }
  #primary-host { display: block; }

  #empty-msg {
    padding: 24px;
    color: #888;
    line-height: 1.5;
  }
  #empty-msg code {
    background: #2d2d2d;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: monospace;
    font-size: 0.9em;
  }
  #empty-msg a { color: #6ed29a; }
</style>
</head>
<body>
<header>
  <span class="title">ttyview</span>
  <span class="sep">·</span>
  <button id="pane-picker-btn" type="button" aria-haspopup="listbox" aria-expanded="false">
    <span class="label" id="pane-picker-label">—</span>
    <span class="chev">▾</span>
  </button>
  <!-- Hidden native select kept for tests + a11y; mirrors the picker. -->
  <select id="pane-select" style="display:none" aria-hidden="true"></select>
  <button id="refresh" title="Refresh pane list">↻</button>
  <span class="font-ctl">
    <button id="font-down" title="Smaller font">A−</button>
    <button id="font-fit" title="Auto-fit pane to viewport">↔</button>
    <button id="font-up" title="Larger font">A+</button>
  </span>
  <button id="scroll-bottom" title="Scroll to live tail">↓</button>
  <span class="status" id="status">disconnected</span>
</header>

<div id="pane-picker-overlay" role="dialog" aria-label="Choose a pane">
  <div id="pane-picker-panel" role="listbox">
    <div class="pp-header">Choose a pane</div>
    <div id="pane-picker-list"></div>
  </div>
</div>

<div id="grid-host">
  <div id="empty-msg">
    Loading panes…
  </div>
  <div id="sb-host"></div>
  <div id="primary-host"></div>
</div>

<div id="input-row">
  <textarea id="input-text" placeholder="Type a message — Enter to send, Shift+Enter for newline" rows="1"></textarea>
  <button id="send-btn" type="button">Send</button>
</div>

<script>
const $host = document.getElementById('grid-host');
const $sbHost = document.getElementById('sb-host');
const $primaryHost = document.getElementById('primary-host');
const $empty = document.getElementById('empty-msg');
const $select = document.getElementById('pane-select');
const $refresh = document.getElementById('refresh');
const $status = document.getElementById('status');

let activePaneId = null;
let cells = new Map();   // "r,c" -> <span>
let ws = null;
let wsRetryMs = 1000;

// === Diagnostic logging ===
// Lightweight client telemetry for debugging. Buffered locally,
// flushed via WS every 1s OR when the buffer hits 64 events.
// Server drops them silently unless --diag-log is set on the
// daemon (privacy default). Events MUST contain only metadata —
// no cell content, no user input text.
const ttvDiagBuf = [];
let ttvDiagFlushScheduled = false;
function ttvDiag(category, data) {
  ttvDiagBuf.push({
    ts: Date.now(),
    cat: category,
    ...data,
  });
  if (ttvDiagBuf.length >= 64) {
    ttvDiagFlush();
  } else if (!ttvDiagFlushScheduled) {
    ttvDiagFlushScheduled = true;
    setTimeout(() => { ttvDiagFlushScheduled = false; ttvDiagFlush(); }, 1000);
  }
}
function ttvDiagFlush() {
  if (!ttvDiagBuf.length) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const events = ttvDiagBuf.splice(0, ttvDiagBuf.length);
  ws.send(JSON.stringify({ t: 'diag', events }));
}
// Send any pending events before the page closes (mobile tab swap, reload).
window.addEventListener('pagehide', ttvDiagFlush);
window.addEventListener('beforeunload', ttvDiagFlush);
// Capture uncaught errors
window.addEventListener('error', (e) => {
  ttvDiag('error', { msg: String(e.message), src: e.filename, line: e.lineno });
});

// Main-thread-stall detector. setInterval fires every 100ms; if it
// fires LATE by >250ms, the main thread was blocked. Helps tell
// "the browser was busy for X ms" from "JS was busy for X ms".
let lastStallTick = performance.now();
setInterval(() => {
  const now = performance.now();
  const expected = lastStallTick + 100;
  const stall = now - expected;
  lastStallTick = now;
  if (stall > 250) {
    ttvDiag('stall', { dur_ms: +stall.toFixed(0) });
  }
}, 100);
// Cap diff-flush size so a giant batch can't itself become a stall.
// If panel ever sends a really big diff (e.g. on first connect),
// process at most N cells per frame, deferring the rest.
window.__ttvDiagBuf = ttvDiagBuf;

function setStatus(text, cls) {
  $status.textContent = text;
  $status.className = 'status' + (cls ? ' ' + cls : '');
}

function colorToCss(color) {
  if (!color || color.kind === 'default') return null;
  if (color.kind === 'palette') {
    const palette16 = [
      '#000000', '#cd0000', '#00cd00', '#cdcd00', '#0000ee', '#cd00cd', '#00cdcd', '#e5e5e5',
      '#7f7f7f', '#ff0000', '#00ff00', '#ffff00', '#5c5cff', '#ff00ff', '#00ffff', '#ffffff',
    ];
    if (color.idx < 16) return palette16[color.idx];
    if (color.idx < 232) {
      const i = color.idx - 16;
      const r = Math.floor(i / 36) * 51;
      const g = Math.floor((i % 36) / 6) * 51;
      const b = (i % 6) * 51;
      return 'rgb(' + r + ',' + g + ',' + b + ')';
    }
    const v = (color.idx - 232) * 10 + 8;
    return 'rgb(' + v + ',' + v + ',' + v + ')';
  }
  if (color.kind === 'rgb') {
    return 'rgb(' + color.r + ',' + color.g + ',' + color.b + ')';
  }
  return null;
}

function applyCellStyle(node, cell) {
  const fg = colorToCss(cell.fg);
  const bg = colorToCss(cell.bg);
  const a = cell.attrs || {};
  let css = '';
  const hasStyle = fg || bg || a.bold || a.italic || a.underline || a.strike || a.dim || a.inverse;
  if (hasStyle) {
    if (a.inverse) {
      css = 'color:' + (bg || '#1e1e1e') + ';background-color:' + (fg || '#d4d4d4') + ';';
    } else {
      if (fg) css += 'color:' + fg + ';';
      if (bg) css += 'background-color:' + bg + ';';
    }
    if (a.bold) css += 'font-weight:bold;';
    if (a.italic) css += 'font-style:italic;';
    let td = '';
    if (a.underline) td += 'underline ';
    if (a.strike) td += 'line-through';
    const tdv = td.trim();
    if (tdv) css += 'text-decoration:' + tdv + ';';
    if (a.dim) css += 'opacity:0.6;';
  }
  if (node._ttvCss !== css) {
    node.style.cssText = css;
    node._ttvCss = css;
  }
}

function cellClassFor(width) {
  if (width === 0) return 'ttv-cell ttv-cell-w0';
  if (width === 2) return 'ttv-cell ttv-cell-w2';
  return 'ttv-cell';
}

function buildFrozenRow(rowSpec) {
  const row = document.createElement('div');
  row.className = 'ttv-row frozen';
  const rowCells = rowSpec.cells || [];
  for (let c = 0; c < rowCells.length; c++) {
    const cell = rowCells[c];
    const width = cell.width != null ? cell.width : 1;
    const span = document.createElement('span');
    span.className = cellClassFor(width);
    span.textContent = width === 0 ? '' : (cell.ch || ' ');
    applyCellStyle(span, cell);
    row.appendChild(span);
  }
  return row;
}

function buildGrid(screen) {
  $empty.style.display = 'none';
  $sbHost.innerHTML = '';
  $primaryHost.innerHTML = '';
  cells = new Map();
  // Schema: { size, primary: [{cells, wrapped}], alt, scrollback, ... }
  // Frozen scrollback rows are immutable once written. CC's primary-buffer
  // render-leak can rewrite them upstream — by keeping them OUT of the
  // cell map, our DOM ignores those writes (only primary cells are in
  // the map and receive cell-diff updates).
  const sb = screen.scrollback || [];
  for (let r = 0; r < sb.length; r++) {
    $sbHost.appendChild(buildFrozenRow(sb[r]));
  }
  // Primary (live) buffer — alt if active, primary otherwise.
  const lines = (screen.alt && screen.alt.length) ? screen.alt : (screen.primary || []);
  for (let r = 0; r < lines.length; r++) {
    const row = document.createElement('div');
    row.className = 'ttv-row';
    const rowCells = lines[r].cells || [];
    for (let c = 0; c < rowCells.length; c++) {
      const cell = rowCells[c];
      const width = cell.width != null ? cell.width : 1;
      const span = document.createElement('span');
      span.className = cellClassFor(width);
      span.textContent = width === 0 ? '' : (cell.ch || ' ');
      applyCellStyle(span, cell);
      row.appendChild(span);
      cells.set(r + ',' + c, span);
    }
    $primaryHost.appendChild(row);
  }
  // Track pane width for autofit.
  if (screen.size && Array.isArray(screen.size) && screen.size[1]) {
    lastPaneCols = screen.size[1];
  } else if (lines.length && lines[0].cells) {
    lastPaneCols = lines[0].cells.length;
  }
  // Run autofit AFTER cells are in the DOM so probe measurement is
  // accurate (font may not have loaded yet).
  requestAnimationFrame(autoFit);
  // Scroll to bottom — show live tail by default.
  $host.scrollTop = $host.scrollHeight;
}

function applyCellDiff(diff) {
  for (const e of diff.cells) {
    const node = cells.get(e.r + ',' + e.c);
    if (!node) continue;
    const ch = (e.width === 0) ? '' : (e.ch || ' ');
    if (node.textContent !== ch) node.textContent = ch;
    applyCellStyle(node, e);
    const desired = cellClassFor(e.width);
    if (node.className !== desired) node.className = desired;
  }
}

// rAF queue for cell-diff events. Multiple WS frames in the same
// frame collapse into one DOM-mutation pass — keeps tap response
// instant under heavy streaming load.
let pendingDiffs = [];
let diffRafId = 0;
function flushDiffs() {
  diffRafId = 0;
  const batch = pendingDiffs;
  pendingDiffs = [];
  let totalCells = 0;
  const t0 = performance.now();
  for (const d of batch) {
    if (d.p !== activePaneId) continue;
    applyCellDiff(d);
    totalCells += (d.cells && d.cells.length) || 0;
  }
  const dur = performance.now() - t0;
  // Only log if non-trivial — most flushes are sub-ms with a few cells.
  if (dur > 4 || totalCells > 100) {
    ttvDiag('diff-flush', {
      batch: batch.length,
      cells: totalCells,
      dur_ms: +dur.toFixed(2),
    });
  }
}

function appendScrollback(evt) {
  if (!evt.rows || evt.rows.length === 0) return;
  // Preserve the user's reading position. If they're at the live tail,
  // stay glued. If they're scrolled up reading history, don't yank them.
  const wasAtBottom = ($host.scrollHeight - $host.scrollTop - $host.clientHeight) < 30;
  const frag = document.createDocumentFragment();
  for (const row of evt.rows) {
    frag.appendChild(buildFrozenRow(row));
  }
  $sbHost.appendChild(frag);
  if (wasAtBottom) $host.scrollTop = $host.scrollHeight;
}

let panesCache = [];

function paneLabel(p) {
  return p.session + ' (' + p.id + ', ' + p.cols + '×' + p.rows + ')';
}

function updatePaneLabel() {
  const $lbl = document.getElementById('pane-picker-label');
  const p = panesCache.find(x => x.id === activePaneId);
  $lbl.textContent = p ? paneLabel(p) : (activePaneId || '—');
}

function renderPanePickerList() {
  const $list = document.getElementById('pane-picker-list');
  $list.innerHTML = '';
  for (const p of panesCache) {
    const item = document.createElement('div');
    item.className = 'pp-item' + (p.id === activePaneId ? ' active' : '');
    item.setAttribute('role', 'option');
    item.setAttribute('data-pane-id', p.id);
    const sess = document.createElement('span');
    sess.className = 'pp-session';
    sess.textContent = p.session;
    const meta = document.createElement('span');
    meta.className = 'pp-meta';
    meta.textContent = p.id + ' · ' + p.cols + '×' + p.rows;
    item.appendChild(sess);
    item.appendChild(meta);
    item.addEventListener('click', function() {
      closePanePicker();
      // Synchronously dispatch the selection — selectPane shows the
      // loading state in the same frame.
      selectPane(p.id);
    });
    $list.appendChild(item);
  }
}

function openPanePicker() {
  const t0 = performance.now();
  renderPanePickerList();
  const t1 = performance.now();
  document.getElementById('pane-picker-overlay').classList.add('open');
  document.getElementById('pane-picker-btn').setAttribute('aria-expanded', 'true');
  const t2 = performance.now();
  // After current frame paints, log when the user could ACTUALLY see it.
  requestAnimationFrame(() => {
    const t3 = performance.now();
    ttvDiag('picker-open', {
      render_ms: +(t1 - t0).toFixed(2),
      class_ms: +(t2 - t1).toFixed(2),
      paint_ms: +(t3 - t2).toFixed(2),
      total_ms: +(t3 - t0).toFixed(2),
      pane_count: panesCache.length,
    });
  });
}
function closePanePicker() {
  document.getElementById('pane-picker-overlay').classList.remove('open');
  document.getElementById('pane-picker-btn').setAttribute('aria-expanded', 'false');
}

async function loadPanes() {
  try {
    const r = await fetch('/panes');
    const list = await r.json();
    panesCache = list || [];
    $select.innerHTML = '';
    if (!list || list.length === 0) {
      $empty.innerHTML = 'No tmux sessions found. Start one with <code>tmux new-session -s mywork</code> and refresh.';
      $empty.style.display = 'block';
      updatePaneLabel();
      return [];
    }
    // Mirror into hidden <select> so the contract test (and any
    // assistive tech) sees the options.
    for (const p of list) {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = paneLabel(p);
      $select.appendChild(opt);
    }
    updatePaneLabel();
    return list;
  } catch (e) {
    setStatus('error: ' + e.message, 'error');
    return [];
  }
}

async function loadGrid(paneId) {
  setStatus('loading…');
  try {
    // max_scrollback=200 → ~4-5 viewports of history. Diag log showed
    // even at 500 rows (30k cells), mobile Chrome paint stalled
    // ~1.7s when the picker overlay opacity changed. Going to 200
    // (~12k cells) puts us comfortably below the threshold. v0.0.3
    // will add lazy-load-more on scroll-to-top to support reading
    // deeper history without paying the upfront DOM cost.
    const r = await fetch('/panes/' + encodeURIComponent(paneId) + '/grid?max_scrollback=200');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const screen = await r.json();
    buildGrid(screen);
    setStatus('loaded ' + paneId, 'connected');
  } catch (e) {
    setStatus('grid error: ' + e.message, 'error');
  }
}

function connectWs() {
  if (ws) { try { ws.close(); } catch (e) {} }
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');
  ws.onopen = function() {
    setStatus('connected', 'connected');
    wsRetryMs = 1000;
    if (activePaneId) {
      ws.send(JSON.stringify({ t: 'sub', p: activePaneId }));
    }
  };
  ws.onmessage = function(ev) {
    let msg;
    try { msg = JSON.parse(ev.data); } catch (e) { return; }
    if (msg.p !== activePaneId) return;
    if (msg.t === 'cell-diff') {
      // rAF-batched: queue the diff and apply on next animation frame.
      // Without this, a flood of cell-diff events (CC streaming during
      // a thinking response) ties up the main thread synchronously,
      // delaying tap events by hundreds of ms. Batching coalesces
      // multiple WS frames into one DOM-mutation pass per ~16ms,
      // which keeps tap response immediate.
      pendingDiffs.push(msg);
      if (!diffRafId) diffRafId = requestAnimationFrame(flushDiffs);
    } else if (msg.t === 'grid-reset') {
      loadGrid(activePaneId);
    } else if (msg.t === 'scrollback-append') {
      appendScrollback(msg);
    }
  };
  ws.onclose = function() {
    setStatus('reconnecting in ' + (wsRetryMs/1000) + 's…');
    setTimeout(connectWs, wsRetryMs);
    wsRetryMs = Math.min(wsRetryMs * 2, 15000);
  };
  ws.onerror = function() { setStatus('ws error', 'error'); };
}

async function selectPane(paneId) {
  if (paneId === activePaneId) return;
  const t0 = performance.now();
  const prevPaneId = activePaneId;
  activePaneId = paneId;
  $sbHost.innerHTML = '';
  $primaryHost.innerHTML = '';
  cells = new Map();
  $host.classList.add('loading');
  updatePaneLabel();
  setStatus('loading ' + paneId + '…');
  if (ws && ws.readyState === WebSocket.OPEN && prevPaneId) {
    ws.send(JSON.stringify({ t: 'unsub', p: prevPaneId }));
  }
  const tSync = performance.now();
  await loadGrid(paneId);
  const tFetch = performance.now();
  $host.classList.remove('loading');
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ t: 'sub', p: paneId }));
  }
  ttvDiag('pane-switch', {
    from: prevPaneId, to: paneId,
    sync_ms: +(tSync - t0).toFixed(2),
    fetch_ms: +(tFetch - tSync).toFixed(2),
    total_ms: +(performance.now() - t0).toFixed(2),
  });
}

// Hidden select still works for screen-readers + tests
$select.addEventListener('change', function() { selectPane($select.value); });
// Custom picker
document.getElementById('pane-picker-btn').addEventListener('click', function() {
  ttvDiag('picker-click', {});
  openPanePicker();
});
// Capture taps from the user — useful to confirm "did the click reach JS?"
document.addEventListener('touchstart', function() {
  ttvDiag('tap', {});
}, { passive: true, capture: true });
document.getElementById('pane-picker-overlay').addEventListener('click', function(e) {
  // Tap outside the panel closes
  if (e.target.id === 'pane-picker-overlay') closePanePicker();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closePanePicker();
});
$refresh.addEventListener('click', async function() {
  await loadPanes();
  if (activePaneId) await loadGrid(activePaneId);
});

// === Font size controls ===
let currentFontPx = parseFloat(localStorage.getItem('ttv-font-size')) || 12;
let autoFitOn = localStorage.getItem('ttv-autofit') !== 'false'; // default on
let lastPaneCols = 80;

function applyFont(px) {
  currentFontPx = Math.max(8, Math.min(28, px));
  document.documentElement.style.setProperty('--ttv-font-size', currentFontPx + 'px');
  localStorage.setItem('ttv-font-size', String(currentFontPx));
}

function measureCharWidth() {
  // Build a hidden probe with the current font and measure its rendered width.
  const probe = document.createElement('span');
  probe.style.cssText = 'position:absolute;visibility:hidden;white-space:pre;font-family:' +
    "'JetBrains Mono','Cascadia Code','Fira Code',Menlo,Consolas,monospace;font-size:" +
    currentFontPx + 'px';
  probe.textContent = 'M'.repeat(40);
  document.body.appendChild(probe);
  const w = probe.getBoundingClientRect().width / 40;
  probe.remove();
  return w;
}

function autoFit() {
  if (!autoFitOn) return;
  const styles = getComputedStyle($host);
  const padL = parseFloat(styles.paddingLeft) || 0;
  const padR = parseFloat(styles.paddingRight) || 0;
  // Account for vertical scrollbar width if present (~12-15 px on mobile).
  const sbWidth = $host.offsetWidth - $host.clientWidth;
  const avail = $host.clientWidth - padL - padR - sbWidth;
  if (avail <= 0 || lastPaneCols <= 0) return;
  const charW = measureCharWidth();
  if (!charW || charW <= 0) return;
  // Pick the largest font that fits pane_cols × charW into avail.
  // Iterate down from current; cheaper than a math derivation that
  // assumes linear scaling (font metrics aren't perfectly linear).
  const targetCharW = avail / lastPaneCols;
  const ratio = targetCharW / charW;
  const target = Math.max(8, Math.min(28, Math.floor(currentFontPx * ratio)));
  if (target !== currentFontPx) applyFont(target);
}

document.getElementById('font-down').addEventListener('click', function() {
  autoFitOn = false; localStorage.setItem('ttv-autofit', 'false');
  applyFont(currentFontPx - 1);
});
document.getElementById('font-up').addEventListener('click', function() {
  autoFitOn = false; localStorage.setItem('ttv-autofit', 'false');
  applyFont(currentFontPx + 1);
});
document.getElementById('font-fit').addEventListener('click', function() {
  autoFitOn = true; localStorage.setItem('ttv-autofit', 'true');
  autoFit();
});
document.getElementById('scroll-bottom').addEventListener('click', function() {
  $host.scrollTop = $host.scrollHeight;
});

// Re-fit on viewport resize (orientation, address-bar collapse, keyboard).
window.addEventListener('resize', autoFit, { passive: true });
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', autoFit, { passive: true });
}

applyFont(currentFontPx);

// === Input handling ===
const $input = document.getElementById('input-text');
const $sendBtn = document.getElementById('send-btn');

function sendInput(keys) {
  if (!ws || ws.readyState !== WebSocket.OPEN || !activePaneId) return;
  // CC's TUI (and bash readline, vim, …) read CR as Enter, not LF.
  // The textarea produces \n on Enter — convert to \r before forwarding.
  const converted = keys.replace(/\n/g, '\r');
  ws.send(JSON.stringify({ t: 'input', p: activePaneId, keys: converted }));
}

function submitInput() {
  const text = $input.value;
  if (!text) return;
  // Append \r so the message gets submitted (vs. just typed into the prompt).
  sendInput(text + '\r');
  $input.value = '';
  autoResizeInput();
}

function autoResizeInput() {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 120) + 'px';
}

$sendBtn.addEventListener('click', submitInput);
$input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    submitInput();
  }
});
$input.addEventListener('input', autoResizeInput);

(async function() {
  const panes = await loadPanes();
  if (panes && panes.length) {
    $select.value = panes[0].id;
    // First-paint loading state so the empty grid shows feedback
    // immediately, before the /grid fetch returns.
    $host.classList.add('loading');
    setStatus('loading ' + panes[0].id + '…');
    await selectPane(panes[0].id);
    connectWs();
  }
})();
</script>
</body>
