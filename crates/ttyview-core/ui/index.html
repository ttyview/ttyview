      if (typeof color === 'string') return null;  // "Default"
      if (typeof color === 'object') {
        if (typeof color.Indexed === 'number') return indexedToCss(color.Indexed);
        if (color.Rgb && typeof color.Rgb === 'object') {
          const { r, g, b } = color.Rgb;
          return 'rgb(' + r + ',' + g + ',' + b + ')';
        }
        // legacy/alt shapes — handle gracefully
        if (typeof color.idx === 'number') return indexedToCss(color.idx);
        if (typeof color.r === 'number') return 'rgb(' + color.r + ',' + color.g + ',' + color.b + ')';
      }
      return null;
    }
    function applyCellStyle(node, cell) {
      const fg = colorToCss(cell.fg);
      const bg = colorToCss(cell.bg);
      const a = cell.attrs || {};
      let css = '';
      const hasStyle = fg || bg || a.bold || a.italic || a.underline || a.strike || a.dim || a.inverse;
      if (hasStyle) {
        if (a.inverse) {
          css = 'color:' + (bg || '#1e1e1e') + ';background-color:' + (fg || '#d4d4d4') + ';';
        } else {
          if (fg) css += 'color:' + fg + ';';
          if (bg) css += 'background-color:' + bg + ';';
        }
        if (a.bold) css += 'font-weight:bold;';
        if (a.italic) css += 'font-style:italic;';
        let td = '';
        if (a.underline) td += 'underline ';
        if (a.strike) td += 'line-through';
        const tdv = td.trim();
        if (tdv) css += 'text-decoration:' + tdv + ';';
        if (a.dim) css += 'opacity:0.6;';
      }
      if (node._ttvCss !== css) {
        node.style.cssText = css;
        node._ttvCss = css;
      }
    }
    function cellClassFor(width) {
      if (width === 0) return 'ttv-cell ttv-cell-w0';
      if (width === 2) return 'ttv-cell ttv-cell-w2';
      return 'ttv-cell';
    }
    function buildFrozenRow(rowSpec) {
      const row = document.createElement('div');
      row.className = 'ttv-row frozen';
      const rowCells = rowSpec.cells || [];
      for (let c = 0; c < rowCells.length; c++) {
        const cell = rowCells[c];
        const width = cell.width != null ? cell.width : 1;
        const span = document.createElement('span');
        span.className = cellClassFor(width);
        span.textContent = width === 0 ? '' : (cell.ch || ' ');
        applyCellStyle(span, cell);
        row.appendChild(span);
      }
      return row;
    }

    // === Render handlers ===
    function buildGrid(screen) {
      $empty.style.display = 'none';
      $sbHost.innerHTML = '';
      $primaryHost.innerHTML = '';
      cells = new Map();
      // Frozen scrollback rows are immutable once written. CC's primary-buffer
      // render-leak can rewrite them upstream — by keeping them OUT of the
      // cell map, our DOM ignores those writes (only primary cells are in
      // the map and receive cell-diff updates).
      const sb = screen.scrollback || [];
      for (let r = 0; r < sb.length; r++) {
        $sbHost.appendChild(buildFrozenRow(sb[r]));
      }
      const lines = (screen.alt && screen.alt.length) ? screen.alt : (screen.primary || []);
      for (let r = 0; r < lines.length; r++) {
        const row = document.createElement('div');
        row.className = 'ttv-row';
        const rowCells = lines[r].cells || [];
        for (let c = 0; c < rowCells.length; c++) {
          const cell = rowCells[c];
          const width = cell.width != null ? cell.width : 1;
          const span = document.createElement('span');
          span.className = cellClassFor(width);
          span.textContent = width === 0 ? '' : (cell.ch || ' ');
          applyCellStyle(span, cell);
          row.appendChild(span);
          cells.set(r + ',' + c, span);
        }
        $primaryHost.appendChild(row);
      }
      // Run autofit AFTER cells are in the DOM (probe needs accurate
      // metrics; font may not have loaded yet).
      requestAnimationFrame(autoFit);
      // Scroll to the live tail by default.
      host.scrollTop = host.scrollHeight;
    }
    function applyCellDiff(diff) {
      for (const e of diff.cells) {
        const node = cells.get(e.r + ',' + e.c);
        if (!node) continue;
        const ch = (e.width === 0) ? '' : (e.ch || ' ');
        if (node.textContent !== ch) node.textContent = ch;
        applyCellStyle(node, e);
        const desired = cellClassFor(e.width);
        if (node.className !== desired) node.className = desired;
      }
    }
    // rAF queue for cell-diff events. Multiple WS frames in the same
    // animation-frame collapse into one DOM-mutation pass — keeps tap
    // response instant under heavy streaming load.
    function flushDiffs() {
      diffRafId = 0;
      const batch = pendingDiffs;
      pendingDiffs = [];
      let totalCells = 0;
      const t0 = performance.now();
      for (const d of batch) {
        if (d.p !== ctx.api.getActivePane()?.id) continue;
        applyCellDiff(d);
        totalCells += (d.cells && d.cells.length) || 0;
      }
      const dur = performance.now() - t0;
      if (dur > 4 || totalCells > 100) {
        ttvDiag('diff-flush', {
          batch: batch.length,
          cells: totalCells,
          dur_ms: +dur.toFixed(2),
        });
      }
    }
    function appendScrollback(evt) {
      if (!evt.rows || evt.rows.length === 0) return;
      // Preserve the user's reading position. If they're at the live tail,
      // stay glued. If they're scrolled up reading history, don't yank them.
      const wasAtBottom = (host.scrollHeight - host.scrollTop - host.clientHeight) < 30;
      const frag = document.createDocumentFragment();
      for (const row of evt.rows) {
        frag.appendChild(buildFrozenRow(row));
      }
      $sbHost.appendChild(frag);
      if (wasAtBottom) host.scrollTop = host.scrollHeight;
    }

    // === Subscribe to platform events ===
    const offGrid = ctx.api.on('grid-loaded', function(d) { buildGrid(d.screen); });
    const offDiff = ctx.api.on('cell-diff', function(d) {
      pendingDiffs.push(d);
      if (!diffRafId) diffRafId = requestAnimationFrame(flushDiffs);
    });
    const offSb = ctx.api.on('scrollback-append', appendScrollback);
    const offClear = ctx.api.on('pane-clearing', function() {
      $sbHost.innerHTML = '';
      $primaryHost.innerHTML = '';
      cells = new Map();
    });

    return function unmount() {
      offGrid(); offDiff(); offSb(); offClear();
      if (diffRafId) { cancelAnimationFrame(diffRafId); diffRafId = 0; }
      pendingDiffs = [];
      cells = new Map();
      host.innerHTML = '';
    };
  },
});
// =============================================================
// Command palette (Ctrl/Cmd-K)
// =============================================================
//
// A floating list of registered commands. Plugins contribute via
// window.ttyview.contributes.command({ id, name, hotkey?, handler }).
// Filter by typing. Enter runs the active item. Esc closes.
// Hotkey: Ctrl-K (linux/win) or Cmd-K (mac).
(function() {
  const $overlay = document.getElementById('cmd-palette-overlay');
  const $input   = document.getElementById('cmd-palette-input');
  const $list    = document.getElementById('cmd-palette-list');
  if (!$overlay || !$input || !$list) return;

  let activeIdx = 0;
  let visible = [];

  function open() {
    $overlay.classList.add('open');
    $input.value = '';
    activeIdx = 0;
    render('');
    requestAnimationFrame(function() { $input.focus(); });
  }
  function close() {
    $overlay.classList.remove('open');
    $input.blur();
  }
  function fuzzyMatch(query, name, id) {
    if (!query) return 0;
    const q = query.toLowerCase();
    const hayN = (name || '').toLowerCase();
    const hayI = (id || '').toLowerCase();
    if (hayN.includes(q)) return 10 - hayN.indexOf(q) * 0.01;
    if (hayI.includes(q)) return 5 - hayI.indexOf(q) * 0.01;
    // Loose subsequence match: every char of q appears in name in order.
    let i = 0;
    for (let j = 0; j < hayN.length && i < q.length; j++) {
      if (hayN[j] === q[i]) i++;
    }
    if (i === q.length) return 1;
    return -1;
  }
  function render(query) {
    const all = [...window.ttyview._internal.registries.command.values()];
    visible = all
      .map(function(def) { return { def, score: fuzzyMatch(query, def.name, def.id) }; })
      .filter(function(x) { return !query || x.score >= 0; })
      .sort(function(a, b) { return b.score - a.score || a.def.name.localeCompare(b.def.name); })
      .map(function(x) { return x.def; });
    if (activeIdx >= visible.length) activeIdx = 0;
    $list.innerHTML = '';
    if (visible.length === 0) {
      const e = document.createElement('div');
      e.className = 'cmdp-empty';
      e.textContent = all.length === 0
        ? 'No commands registered. Plugins can register via window.ttyview.contributes.command().'
        : 'No matches for "' + query + '".';
      $list.appendChild(e);
      return;
    }
    visible.forEach(function(def, i) {
      const div = document.createElement('div');
      div.className = 'cmdp-item' + (i === activeIdx ? ' active' : '');
      div.setAttribute('role', 'option');
      const name = document.createElement('div'); name.className = 'cmdp-name';
      name.textContent = def.name || def.id;
      const id = document.createElement('div'); id.className = 'cmdp-id';
      id.textContent = def.id + (def.hotkey ? ' · ' + def.hotkey : '');
      div.appendChild(name); div.appendChild(id);
      div.addEventListener('mousedown', function(e) { e.preventDefault(); });
      div.addEventListener('click', function() { run(def); });
      $list.appendChild(div);
    });
  }
  function run(def) {
    close();
    try { def.handler && def.handler(); }
    catch (e) { console.error('command handler threw for ' + def.id, e); }
  }
  $input.addEventListener('input', function() {
    activeIdx = 0;
    render($input.value.trim());
  });
  $input.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { close(); e.preventDefault(); return; }
    if (e.key === 'ArrowDown') {
      activeIdx = Math.min(activeIdx + 1, Math.max(0, visible.length - 1));
      render($input.value.trim());
      e.preventDefault(); return;
    }
    if (e.key === 'ArrowUp') {
      activeIdx = Math.max(activeIdx - 1, 0);
      render($input.value.trim());
      e.preventDefault(); return;
    }
    if (e.key === 'Enter' && visible[activeIdx]) {
      run(visible[activeIdx]);
      e.preventDefault(); return;
    }
  });
  $overlay.addEventListener('click', function(e) {
    if (e.target === $overlay) close();
  });
  document.addEventListener('keydown', function(e) {
    // Ctrl-K (or Cmd-K on macOS) toggles. Avoid swallowing the
    // browser's own Cmd-K (URL bar search) if the modifier is plain
    // Cmd without Shift — common shortcut, but on macOS-style web
    // apps Cmd-K is the convention for command palettes.
    if ((e.ctrlKey || e.metaKey) && (e.key === 'k' || e.key === 'K')) {
      if ($overlay.classList.contains('open')) close();
      else open();
      e.preventDefault();
    }
  });

  // Expose as a public API so plugins / mobile UIs can trigger it
  // without needing the keyboard hotkey.
  window.ttyview.openCommandPalette = open;
  window.ttyview.closeCommandPalette = close;

  // Re-render whenever a command registers/unregisters while the
  // palette is open.
  ['command-registered', 'command-unregistered'].forEach(function(ev) {
    window.ttyview.on(ev, function() {
      if ($overlay.classList.contains('open')) render($input.value.trim());
    });
  });
})();

// === Built-in core commands ===
(function() {
  const tv = window.ttyview;
  tv.contributes.command({
    id: 'ttyview.refresh-panes',
    name: 'Refresh pane list',
    handler: function() { if (typeof loadPanes === 'function') loadPanes(); },
  });
  tv.contributes.command({
    id: 'ttyview.scroll-to-bottom',
    name: 'Scroll to live tail',
    handler: function() {
      const h = document.getElementById('grid-host');
      if (h) h.scrollTop = h.scrollHeight;
    },
  });
  tv.contributes.command({
    id: 'ttyview.open-settings',
    name: 'Open Settings',
    hotkey: '⚙',
    handler: function() { document.getElementById('settings-btn')?.click(); },
  });
  tv.contributes.command({
    id: 'ttyview.pick-pane',
    name: 'Choose pane…',
    handler: function() { document.getElementById('pane-picker-btn')?.click(); },
  });
  tv.contributes.command({
    id: 'ttyview.deactivate-theme',
    name: 'Theme: deactivate (use defaults)',
    handler: function() { tv._internal.setActiveThemeId(null); },
  });
  // Dynamic: one command per registered theme (so users can switch
  // without opening Settings). We re-derive on registry changes.
  function syncThemeCommands() {
    const REG = tv._internal.registries.command;
    // Drop previously-added theme switchers
    const oldKeys = [...REG.keys()].filter(function(k) { return k.startsWith('ttyview.theme.'); });
    for (const k of oldKeys) {
      const def = REG.get(k);
      REG.delete(k);
      tv._internal.emit('command-unregistered', def);
    }
    // Add fresh ones for currently-registered themes
    for (const t of tv._internal.registries.theme.values()) {
      tv.contributes.command({
        id: 'ttyview.theme.' + t.id,
        name: 'Theme: ' + (t.name || t.id),
        handler: (function(id) { return function() { tv._internal.setActiveThemeId(id); }; })(t.id),
      });
    }
    // Same for terminal views.
    const oldViewKeys = [...REG.keys()].filter(function(k) { return k.startsWith('ttyview.view.'); });
    for (const k of oldViewKeys) {
      const def = REG.get(k);
      REG.delete(k);
      tv._internal.emit('command-unregistered', def);
    }
    for (const v of tv._internal.registries.terminalView.values()) {
      tv.contributes.command({
        id: 'ttyview.view.' + v.id,
        name: 'Terminal view: ' + (v.name || v.id),
        handler: (function(id) { return function() { tv._internal.setActiveTerminalViewId(id); }; })(v.id),
      });
    }
  }
  syncThemeCommands();
  ['theme-registered', 'theme-unregistered',
   'terminalView-registered', 'terminalView-unregistered',
  ].forEach(function(ev) { tv.on(ev, syncThemeCommands); });
})();

// Restore saved active view (defaults to cell-grid). If the saved id
// belongs to a plugin that hasn't loaded yet — community-installed
// plugins eval AFTER this point — leave activation to the
// terminalView-registered listener below.
(function() {
  let saved = null;
  try { saved = localStorage.getItem('ttv-active-view'); } catch {}
  const tv = window.ttyview;
  if (saved && tv._internal.registries.terminalView.has(saved)) {
    tv._internal.setActiveTerminalViewId(saved);
  } else {
    tv._internal.setActiveTerminalViewId('cell-grid');
    if (saved) {
      // Saved id refers to a plugin not yet loaded — switch when it does.
      const off = tv.on('terminalView-registered', function(def) {
        if (def && def.id === saved) {
          tv._internal.setActiveTerminalViewId(saved);
          off();
        }
      });
    }
  }
})();

// === Input handling ===
const $input = document.getElementById('input-text');
const $sendBtn = document.getElementById('send-btn');

// Returns true on success, false if the send couldn't go through. Logs
// a diag record either way so a "stuck" message is recoverable from
// ~/.config/ttyview/diag.jsonl. Don't change this to swallow failures
// without telling the caller — submitInput() depends on the boolean
// to decide whether to clear the textarea.
function sendInput(keys) {
  const wsState = ws ? ws.readyState : -1;   // -1 = no ws object yet
  const reason = !ws ? 'no-ws'
    : ws.readyState !== WebSocket.OPEN ? 'ws-not-open'
    : !activePaneId ? 'no-pane'
    : null;
  if (reason) {
    ttvDiag('inp-skip', { reason: reason, ws_state: wsState, pane: activePaneId, len: keys.length });
    return false;
  }
  const converted = keys.replace(/\n/g, '\r');
  try {
    ws.send(JSON.stringify({ t: 'input', p: activePaneId, keys: converted }));
    ttvDiag('inp', { pane: activePaneId, len: converted.length, ws_state: wsState });
    return true;
  } catch (e) {
    ttvDiag('inp-throw', { msg: String(e && e.message), pane: activePaneId, len: keys.length });
    return false;
  }
}

function submitInput() {
  const text = $input.value;
  if (!text) return;
  // Append \r so the message gets submitted (vs. just typed into the prompt).
  // CRITICAL: only clear the textarea on confirmed send. Earlier versions
  // unconditionally cleared, so when the WS happened to be reconnecting
  // (very common after Android Chrome backgrounded the tab) the message
  // disappeared with no trace. The "stuck submit" symptom from
  // 2026-05-09 is this exact bug.
  const ok = sendInput(text + '\r');
  if (!ok) {
    // Visual feedback so the user notices and can retry. setStatus is
    // the same surface the WS lifecycle uses; reverts on next ws-open.
    setStatus('not connected — message kept', 'error');
    flashSendBtnError();
    return;
  }
  $input.value = '';
  autoResizeInput();
}

function flashSendBtnError() {
  if (!$sendBtn) return;
  const prev = $sendBtn.style.background;
  $sendBtn.style.background = '#f48771';
  setTimeout(function() { $sendBtn.style.background = prev; }, 800);
}

function autoResizeInput() {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 120) + 'px';
}

$sendBtn.addEventListener('click', submitInput);
$input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    submitInput();
  }
});
$input.addEventListener('input', autoResizeInput);

function pickInitialPane(panes) {
  // Restore the last-selected pane across reloads. Try id first
  // (exact match — same tmux server, same session). Fall back to
  // session name (handles tmux server restart where pane ids
  // reassign). Final fallback: first pane.
  let lastId, lastSession;
  try {
    lastId = localStorage.getItem('ttv-last-pane-id');
    lastSession = localStorage.getItem('ttv-last-session');
  } catch {}
  if (lastId) {
    const byId = panes.find(p => p.id === lastId);
    if (byId) return byId;
  }
  if (lastSession) {
    const bySession = panes.find(p => p.session === lastSession);
    if (bySession) return bySession;
  }
  return panes[0];
}

(async function() {
  // Load installed plugins BEFORE we fetch panes — gives plugins a
  // chance to subscribe to events emitted during pane bootstrap (e.g.
  // panes-updated, grid-loaded). A plugin that registers late still
  // works for future events; this just maximizes "first-paint feels
  // complete" by mounting widgets before any rendering happens.
  await loadAllInstalledPlugins();
  const panes = await loadPanes();
  if (panes && panes.length) {
    const initial = pickInitialPane(panes);
    $select.value = initial.id;
    $host.classList.add('loading');
    setStatus('loading ' + initial.id + '…');
    await selectPane(initial.id);
    connectWs();
  }
})();
</script>
</body>
